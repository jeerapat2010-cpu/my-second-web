                            {activeTab === 'unitAnalysis' && <UnitAnalysisView processedUnitData={processedUnitData} currentTheme={currentTheme} />}
                            {activeTab === 'problem' && <ProblemAnalysisView districtData={processedDistrictData} unitData={processedUnitData} currentTheme={currentTheme} />}
                            {activeTab === 'topDrugs' && <TopDrugsView currentTheme={currentTheme} />}
                            {activeTab === 'replacement' && <ReplacementView currentTheme={currentTheme} />}
                            {activeTab === 'quality' && <QualityView currentTheme={currentTheme} />}
                            {activeTab === 'supportingData' && <SupportingDataView currentTheme={currentTheme} />}
                            {activeTab === 'method' && <MethodView currentTheme={currentTheme} />}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
