    const DrawingPad = ({ guideText, size, clearTrigger, onDraw, onStats, inkColor, tool, isDarkMode }) => {
      const canvasRef = useRef(null);
      const contextRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const strokeCountRef = useRef(0);
      const startAtRef = useRef(0);
      useEffect(() => {
        const canvas = canvasRef.current;
        canvas.width = size * 2; canvas.height = size * 2; canvas.style.width = `${size}px`; canvas.style.height = `${size}px`;
        const context = canvas.getContext('2d'); context.scale(2,2); contextRef.current = context;
      }, [size]);
      useEffect(() => {
        const context = contextRef.current; if (!context) return;
        context.lineCap = 'round'; context.lineJoin = 'round';
        context.strokeStyle = (isDarkMode && inkColor === '#1F1F1F') ? '#FFFFFF' : inkColor;
        if (tool === 'brush') { context.lineWidth = size > 150 ? 20 : 12; context.shadowBlur = 5; context.shadowColor = context.strokeStyle; context.globalAlpha = .86; }
        else { context.lineWidth = size > 150 ? 13 : 8; context.shadowBlur = 0; context.globalAlpha = 1; }
      }, [inkColor, tool, size, isDarkMode]);
      useEffect(() => {
        if (clearTrigger > 0 && canvasRef.current) {
          const canvas = canvasRef.current; const context = canvas.getContext('2d');
          context.save(); context.globalAlpha = 1; context.clearRect(0,0,canvas.width,canvas.height); context.restore(); strokeCountRef.current = 0;
          onStats && onStats({strokes:0, coverage:0, durationMs:0});
        }
      }, [clearTrigger]);
      const getCoordinates = (e) => {
        if (e.touches && e.touches.length > 0) { const touch = e.touches[0]; const rect = canvasRef.current.getBoundingClientRect(); return { offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top }; }
        return { offsetX: e.nativeEvent.offsetX, offsetY: e.nativeEvent.offsetY };
      };
      const calcCoverage = () => {
        try {
          const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
          let ink = 0; for (let i=3; i<data.length; i+=4) if (data[i] > 8) ink++;
          return Math.round((ink / (canvas.width*canvas.height)) * 1000) / 10;
        } catch { return 0; }
      };
      const startDrawing = (e) => { e.preventDefault && e.preventDefault(); const {offsetX, offsetY} = getCoordinates(e); const ctx = contextRef.current; ctx.beginPath(); ctx.moveTo(offsetX, offsetY); setIsDrawing(true); strokeCountRef.current += 1; startAtRef.current = Date.now(); onDraw && onDraw(); };
      const finishDrawing = () => { if (!isDrawing) return; contextRef.current.closePath(); setIsDrawing(false); onStats && onStats({strokes: strokeCountRef.current, coverage: calcCoverage(), durationMs: Date.now() - startAtRef.current}); };
      const draw = (e) => { if (!isDrawing) return; e.preventDefault && e.preventDefault(); const {offsetX, offsetY} = getCoordinates(e); contextRef.current.lineTo(offsetX, offsetY); contextRef.current.stroke(); };
      return (
        <div className={`relative rounded-2xl shadow-sm border-2 overflow-hidden shrink-0 flex items-center justify-center transition-all duration-300 hover:shadow-md ${isDarkMode ? 'bg-[#21150f] border-amber-700/50' : 'bg-[#fffaf0] border-[#e8c36a]'}`} style={{width:size, height:size}}>
          <div className="absolute inset-0 pointer-events-none opacity-30">
            <div className={`w-full h-full border-b border-dashed absolute top-1/2 ${isDarkMode ? 'border-amber-700' : 'border-red-700'}`}></div>
            <div className={`w-full h-full border-r border-dashed absolute left-1/2 ${isDarkMode ? 'border-amber-700' : 'border-red-700'}`}></div>
            <div className={`w-full h-full border border-dotted absolute inset-4 rounded-xl ${isDarkMode ? 'border-amber-900' : 'border-amber-200'}`}></div>
          </div>
          {guideText && <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none"><span className={`font-serif ${isDarkMode ? 'text-amber-950/70' : 'text-red-100'}`} style={{fontSize: guideText.length > 2 ? size*.32 : guideText.length > 1 ? size*.45 : size*.75}}>{guideText}</span></div>}
          <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseUp={finishDrawing} onMouseMove={draw} onMouseOut={finishDrawing} onTouchStart={startDrawing} onTouchEnd={finishDrawing} onTouchMove={draw} className="absolute inset-0 z-10 cursor-crosshair touch-none" />
        </div>
      );
    };

    const ToneGraph = ({tone=1}) => {
      const paths = {1:'M15 35 L145 35', 2:'M15 75 L145 25', 3:'M15 50 C45 85, 85 85, 145 25', 4:'M15 25 L145 78', 0:'M15 55 L145 55'};
      const labels = {1:'เสียง 1 สูงราบ', 2:'เสียง 2 ขึ้น', 3:'เสียง 3 ต่ำแล้วขึ้น', 4:'เสียง 4 ตก', 0:'เสียงเบา'};
      return <div className="flex flex-col items-center"><svg width="160" height="96" viewBox="0 0 160 96" className="drop-shadow-sm"><line x1="15" y1="20" x2="15" y2="82" stroke="currentColor" opacity=".22"/><line x1="15" y1="82" x2="148" y2="82" stroke="currentColor" opacity=".22"/><path d={paths[tone] || paths[1]} fill="none" stroke="currentColor" strokeWidth="7" strokeLinecap="round"/><circle cx="145" cy={(tone===1?35:tone===2?25:tone===3?25:tone===4?78:55)} r="5" fill="currentColor"/></svg><span className="text-xs font-bold opacity-70">{labels[tone] || labels[1]}</span></div>;
    };

    function ChineseWritingApp() {
      const [currentView, setCurrentView] = useState('menu');
      const [selectedMode, setSelectedMode] = useState('learn');
      const [activeTab, setActiveTab] = useState('pinyin');
      const [currentLessonItem, setCurrentLessonItem] = useState(LESSONS[0]);
      const [currentCharIndex, setCurrentCharIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [hasDrawn, setHasDrawn] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [clearTrigger, setClearTrigger] = useState(0);
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [isLeftHanded, setIsLeftHanded] = useState(false);
      const [inkColor, setInkColor] = useState('#5B2118');
      const [tool, setTool] = useState('pen');
      const [showStrokeGuide, setShowStrokeGuide] = useState(true);
      const COLORS = ['#5B2118','#B91C1C','#D4A017','#1F1F1F','#15803D'];
      const [gameScore, setGameScore] = useState(0);
      const [gameQuestionCount, setGameQuestionCount] = useState(0);
      const [gameCurrentQuestion, setGameCurrentQuestion] = useState(null);
      const [toneQuestion, setToneQuestion] = useState(null);
      const [exerciseType, setExerciseType] = useState('hanziToPinyin');
      const [exerciseQuestion, setExerciseQuestion] = useState(null);
      const [exerciseStats, setExerciseStats] = useState({correct:0,total:0});
      const [drawStats, setDrawStats] = useState({strokes:0, coverage:0, durationMs:0});
      const [progress, setProgress] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {completed:{}, attempts:{}, scores:[], srs:{}, streak:{date:null,count:0}}; }
        catch { return {completed:{}, attempts:{}, scores:[], srs:{}, streak:{date:null,count:0}}; }
      });
      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }, [progress]);

      const filteredLessons = LESSONS.filter(l => l.type === activeTab);
      const dueItems = useMemo(() => Object.entries(progress.srs || {}).filter(([k,v]) => (v.nextDue || 0) <= Date.now()).map(([k]) => k), [progress]);
      const avgScore = progress.scores?.length ? Math.round(progress.scores.reduce((a,b)=>a+b,0)/progress.scores.length) : 0;

      const markProgress = (charData, finalScore=80, quality='ok') => {
        const key = `${charData.kind || 'item'}:${charData.kana}:${charData.romaji}`;
        setProgress(prev => {
          const old = prev.srs?.[key] || {level:0, ease:2};
          const delta = quality === 'easy' ? 2 : quality === 'hard' ? 0 : quality === 'forgot' ? -1 : 1;
          const level = Math.max(0, Math.min(8, old.level + delta));
          const days = quality === 'forgot' ? .25 : [0.5,1,2,4,7,14,30,60,120][level] || 7;
          const streakDate = prev.streak?.date === todayISO() ? prev.streak : {date: todayISO(), count: (prev.streak?.date ? prev.streak.count + 1 : 1)};
          return {
            completed: {...prev.completed, [key]: true},
            attempts: {...prev.attempts, [key]: (prev.attempts?.[key] || 0) + 1},
            scores: [...(prev.scores || []), finalScore].slice(-200),
            srs: {...(prev.srs || {}), [key]: {level, ease: quality, nextDue:addDays(days), last:Date.now(), text:charData.kana, pinyin:charData.romaji}},
            streak: streakDate
          };
        });
      };

      const startLesson = (lesson) => { setCurrentLessonItem(lesson); setCurrentCharIndex(0); setScore(0); setCurrentView('lessonIntro'); setFeedback(null); setHasDrawn(false); setDrawStats({strokes:0, coverage:0, durationMs:0}); };
      const beginSelectedLesson = () => { setCurrentView(selectedMode); setFeedback(null); setHasDrawn(false); setClearTrigger(prev => prev + 1); };
      const calcWritingScore = (charData) => {
        const expected = charData.expectedStrokes || 5;
        const strokeScore = Math.max(0, 38 - Math.abs(drawStats.strokes - expected) * 6);
        const coverageIdeal = charData.kind === 'pinyin' ? 3.5 : 6.5;
        const coverageScore = Math.max(0, 32 - Math.abs((drawStats.coverage || 0) - coverageIdeal) * 3);
        const practiceBonus = hasDrawn ? 20 : 0;
        const guideBonus = showStrokeGuide ? 4 : 8;
        return Math.max(35, Math.min(100, Math.round(strokeScore + coverageScore + practiceBonus + guideBonus)));
      };
      const handleNext = () => {
        const charData = currentLessonItem.chars[currentCharIndex];
        const finalScore = selectedMode === 'practice' ? calcWritingScore(charData) : Math.max(75, calcWritingScore(charData));
        if (hasDrawn) { setScore(prev => prev + finalScore); markProgress(charData, finalScore, finalScore >= 86 ? 'easy' : finalScore < 65 ? 'hard' : 'ok'); }
        if (currentCharIndex < currentLessonItem.chars.length - 1) { setCurrentCharIndex(prev => prev + 1); setHasDrawn(false); setFeedback(null); setDrawStats({strokes:0, coverage:0, durationMs:0}); setClearTrigger(prev=>prev+1); }
        else { setCurrentView('summary'); }
      };
      const clearCanvas = () => { setClearTrigger(prev => prev + 1); setHasDrawn(false); setFeedback(null); setDrawStats({strokes:0, coverage:0, durationMs:0}); };
      const checkAnswer = () => {
        const charData = currentLessonItem.chars[currentCharIndex];
        if (!hasDrawn) { setFeedback({type:'error', text:'คัดให้ครบก่อนน้า~'}); return; }
        const finalScore = calcWritingScore(charData);
        setFeedback({type: finalScore >= 65 ? 'success' : 'error', text: `คะแนนประเมิน ${finalScore}/100 · ขีด ${drawStats.strokes}/${charData.expectedStrokes || '-'} · พื้นที่หมึก ${drawStats.coverage || 0}%`});
      };
      const calculateStars = () => {
        const maxScore = currentLessonItem.chars.length * 100; const percentage = maxScore ? (score/maxScore)*100 : gameScore;
        if (percentage >= 85 || gameScore >= 80) return 3; if (percentage >= 60 || gameScore >= 50) return 2; return 1;
      };
      const startMiniGame = () => { setGameScore(0); setGameQuestionCount(0); setCurrentView('game'); setTimeout(() => generateNextQuestion(0), 0); };
      const generateNextQuestion = (count = gameQuestionCount) => {
        if (count >= 10) { setCurrentView('gameSummary'); return; }
        const targetChar = HANZI_FOR_GAME[Math.floor(Math.random() * HANZI_FOR_GAME.length)];
        let choices = [targetChar];
        while (choices.length < 4) { const randomChar = HANZI_FOR_GAME[Math.floor(Math.random() * HANZI_FOR_GAME.length)]; if (!choices.find(c => c.kana === randomChar.kana)) choices.push(randomChar); }
        setGameCurrentQuestion({target:targetChar, choices:choices.sort(()=>Math.random()-.5)}); setGameQuestionCount(count+1); setFeedback(null);
      };
      const handleGameAnswer = (selectedChar) => {
        if (selectedChar.kana === gameCurrentQuestion.target.kana) { playAudio(gameCurrentQuestion.target.audio); setFeedback({type:'success', text:'ถูกต้องค่ะ 🎉'}); setGameScore(prev=>prev+10); markProgress(gameCurrentQuestion.target, 90, 'easy'); }
        else setFeedback({type:'error', text:`คำตอบคือ ${gameCurrentQuestion.target.kana}`});
        setTimeout(()=>generateNextQuestion(gameQuestionCount), 900);
      };
      const nextToneQuestion = () => { const tones = [1,2,3,4,0]; const t = tones[Math.floor(Math.random()*tones.length)]; const samples = {1:'mā',2:'má',3:'mǎ',4:'mà',0:'ma'}; setToneQuestion({tone:t, sample:samples[t]}); playAudio(samples[t]); };
      const buildExerciseQuestion = (type = exerciseType) => {
        const basePool = type === 'radicalMatch' ? HANZI_FOR_GAME.filter(c => DEEP_NOTES[c.kana]) : HANZI_FOR_GAME;
        const pool = basePool.length ? basePool : HANZI_FOR_GAME;
        const target = pool[Math.floor(Math.random() * pool.length)];
        const deep = getDeepLesson(target, currentLessonItem);
        let prompt = '', answer = '', choices = [], questionText = '';
        if (type === 'hanziToPinyin') { questionText='ตัวจีนนี้อ่านว่าอะไร'; prompt=target.kana; answer=target.romaji; choices=shuffle(uniqueBy([target,...shuffle(pool).slice(0,12)], c=>c.romaji).map(c=>c.romaji)).slice(0,4); }
        else if (type === 'pinyinToHanzi') { questionText='พินอินนี้ตรงกับตัวจีนใด'; prompt=target.romaji; answer=target.kana; choices=shuffle(uniqueBy([target,...shuffle(pool).slice(0,12)], c=>c.kana).map(c=>c.kana)).slice(0,4); }
        else if (type === 'meaningToHanzi') { questionText='ความหมายไทยนี้ตรงกับตัวจีนใด'; prompt=target.vocab?.meaning || ''; answer=target.kana; choices=shuffle(uniqueBy([target,...shuffle(pool).slice(0,12)], c=>c.kana).map(c=>c.kana)).slice(0,4); }
        else if (type === 'radicalMatch') { questionText='ราก/โครงสร้างสำคัญคือข้อใด'; prompt=target.kana; answer=deep.radical; choices=shuffle(uniqueBy([answer, ...shuffle(pool).map(c=>getDeepLesson(c,currentLessonItem).radical)], x=>x)).slice(0,4); }
        else { questionText='พินอินนี้เป็นเสียงวรรณยุกต์ใด'; prompt=target.romaji; answer=String(getToneNumber(target.romaji) || 'เบา/ไม่มี'); choices=['1','2','3','4','เบา/ไม่มี']; }
        if (!choices.includes(answer)) choices = shuffle([answer, ...choices]).slice(0,4);
        setExerciseQuestion({type,target,prompt,answer,choices,questionText}); setFeedback(null);
      };
      const startExercise = (type='hanziToPinyin') => { setExerciseType(type); setExerciseStats({correct:0,total:0}); setCurrentView('exerciseHub'); setTimeout(()=>buildExerciseQuestion(type),0); };
      const answerExercise = (choice) => {
        if (!exerciseQuestion) return;
        const ok = choice === exerciseQuestion.answer;
        setFeedback({type:ok?'success':'error', text: ok?'ถูกต้องค่ะ 🎯':`ยังไม่ใช่ คำตอบคือ ${exerciseQuestion.answer}`});
        setExerciseStats(prev => ({correct:prev.correct + (ok?1:0), total:prev.total+1}));
        if (ok) markProgress(exerciseQuestion.target, 88, 'easy');
        setTimeout(()=>buildExerciseQuestion(exerciseQuestion.type), 900);
      };

      const HeaderButton = ({onClick, icon}) => <button onClick={onClick} className={`p-2 w-10 h-10 flex items-center justify-center rounded-full shadow-sm hover:scale-105 transition ${isDarkMode ? 'bg-red-950 text-amber-100' : 'bg-white/85 text-red-950'}`}><i className={`fas ${icon} text-lg`}></i></button>;

          <div className="mb-3"><b><i className="fas fa-sitemap mr-1 text-amber-600"></i>วิเคราะห์จำง่าย</b><ul className="list-disc pl-5 mt-1 space-y-1 text-xs">{d.analysis.map((x,i)=><li key={i}>{x}</li>)}</ul></div>

          <div className="p-3 rounded-2xl bg-[#5B2118] text-amber-100 text-xs"><b>{Array.isArray(d.tip)?d.tip[0]:d.tip.title}</b><p>{Array.isArray(d.tip)?d.tip[1]:d.tip.detail}</p><p className="opacity-70 mt-1">ตัวอย่าง: {Array.isArray(d.tip)?d.tip[2]:d.tip.example}</p></div>
        </div>;
      };

      const renderLessonIntro = () => {
        const preview = currentLessonItem.chars.slice(0,8);
        const typeText = currentLessonItem.type === 'pinyin' ? 'ระบบเสียงพินอิน' : currentLessonItem.type === 'radical' ? 'รากศัพท์จีน 部首' : currentLessonItem.type === 'medical' ? 'จีนสุขภาพ–สมุนไพร' : 'อักษรจีน HSK';
        return <div className={`flex flex-col h-full p-6 relative z-10 overflow-y-auto custom-scrollbar ${isDarkMode?'text-amber-100':'text-red-950'}`}>
          <div className="flex items-center mb-5"><HeaderButton onClick={()=>setCurrentView('lessonSelect')} icon="fa-chevron-left"/><h2 className="text-2xl font-black ml-4">ก่อนเริ่มบทเรียน</h2></div>
          <div className={`p-5 rounded-3xl mb-4 border ${isDarkMode?'bg-red-950/75 border-amber-700/35':'bg-white/95 border-amber-200'}`}><p className="text-xs font-black opacity-60">{typeText}</p><h3 className="text-xl font-black mt-1">{currentLessonItem.title}</h3><p className="mt-2 text-sm opacity-75">บทนี้จะเรียนแบบ 5 ชั้น: รูปเขียน → เสียง → ราก/โครงสร้าง → คำศัพท์ → ประโยคใช้งานจริง</p><div className="flex flex-wrap gap-2 mt-4">{preview.map((c,i)=><span key={i} className="px-3 py-2 rounded-2xl bg-amber-100 text-red-950 font-serif font-bold">{c.kana}<small className="ml-1 font-sans">{c.romaji}</small></span>)}</div></div>
          <div className="grid grid-cols-2 gap-3 mb-4">{BASIC_STROKES.map((s,i)=><div key={i} className={`p-3 rounded-2xl ${isDarkMode?'bg-red-950/60':'bg-amber-50'}`}><div className="text-3xl font-serif font-black">{s.mark}</div><b className="text-xs">{s.name}</b><p className="text-[11px] opacity-70">{s.detail}</p></div>)}</div>
          <div className={`p-4 rounded-3xl mb-4 ${isDarkMode?'bg-red-950/60':'bg-white/90'}`}><h3 className="font-black mb-2"><i className="fas fa-triangle-exclamation mr-2 text-amber-600"></i>จุดยากของคนไทยที่เกี่ยวข้อง</h3><div className="space-y-2">{THAI_TIPS.slice(0,3).map((t,i)=><div key={i} className="text-xs p-2 rounded-xl bg-amber-50/80 text-red-950"><b>{t[0]}:</b> {t[1]} <span className="opacity-60">({t[2]})</span></div>)}</div></div>
          <button onClick={beginSelectedLesson} className="w-full py-4 rounded-2xl bg-[#B91C1C] text-white font-black shadow-[0_5px_0_#7f1d1d]"><i className="fas fa-play mr-2 text-amber-200"></i>เริ่มฝึกบทนี้</button>
        </div>;
      };

      const renderPathMap = () => <div className={`flex flex-col h-full p-6 relative z-10 overflow-y-auto custom-scrollbar ${isDarkMode?'text-amber-100':'text-red-950'}`}>
        <div className="flex items-center mb-5"><HeaderButton onClick={()=>setCurrentView('menu')} icon="fa-chevron-left"/><h2 className="text-2xl font-black ml-4">Learning Path v4</h2></div>
        <div className="space-y-3 mb-5">{LEARNING_PATH.map((x,i)=><div key={i} className={`p-4 rounded-3xl flex gap-4 items-center ${isDarkMode?'bg-red-950/70 border border-amber-700/35':'bg-white/95'}`}><div className="w-12 h-12 rounded-2xl bg-[#B91C1C] text-amber-200 flex items-center justify-center font-black">{x[0]}</div><div><h3 className="font-black"><i className={`fas ${x[3]} mr-2 text-amber-600`}></i>{x[1]}</h3><p className="text-sm opacity-70">{x[2]}</p></div></div>)}</div>
        <div className={`p-5 rounded-3xl mb-5 ${isDarkMode?'bg-red-950/70':'bg-white/95'}`}><h3 className="font-black mb-3">เส้นทางเฉพาะคุณจี: จีนเภสัช–สมุนไพร</h3>{PHARMACY_PATH.map((g,i)=><div key={i} className="mb-3"><b className="text-amber-700">{g[0]}</b><div className="grid grid-cols-1 gap-1 mt-1">{g[1].map((t,j)=><span key={j} className="text-xs px-3 py-2 rounded-xl bg-amber-50 text-red-950">{t}</span>)}</div></div>)}</div>
        <div className={`p-5 rounded-3xl ${isDarkMode?'bg-red-950/70':'bg-white/95'}`}><h3 className="font-black mb-3">สถานการณ์ฝึกใช้จริง</h3>{SCENARIOS.map((s,i)=><div key={i} className="mb-3"><b>{s[0]}</b>{s[1].map((l,j)=><p key={j} className="text-xs opacity-75 mt-1">• {l}</p>)}</div>)}</div>
      </div>;

        const total = ALL_CHARS.length; const done = Object.keys(progress.completed||{}).length; const percent = Math.round((done/total)*100);
        const topDue = Object.values(progress.srs || {}).filter(v => (v.nextDue || 0) <= Date.now()).slice(0,8);
        return <div className={`flex flex-col h-full p-6 animate-in slide-in-from-bottom duration-300 relative z-10 ${isDarkMode?'text-amber-100':'text-red-950'}`}><div className="flex items-center mb-5"><HeaderButton onClick={()=>setCurrentView('menu')} icon="fa-chevron-left"/><h2 className="text-2xl font-black ml-4">Dashboard ความก้าวหน้า</h2></div><div className="grid grid-cols-2 gap-3 mb-4"><div className={`p-5 rounded-3xl ${isDarkMode?'bg-red-950/75':'bg-white/90'}`}><p className="text-xs opacity-60 font-bold">เรียนแล้ว</p><p className="text-4xl font-black">{done}</p><p className="text-xs opacity-60">จาก {total} รายการ</p></div><div className={`p-5 rounded-3xl ${isDarkMode?'bg-red-950/75':'bg-white/90'}`}><p className="text-xs opacity-60 font-bold">คะแนนเฉลี่ย</p><p className="text-4xl font-black">{avgScore}</p><p className="text-xs opacity-60">จาก {progress.scores?.length || 0} ครั้ง</p></div></div><div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-red-950/75':'bg-white/90'}`}><div className="flex justify-between text-sm font-bold mb-2"><span>Progress</span><span>{percent}%</span></div><div className="w-full h-4 bg-amber-100 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-red-700 to-amber-500" style={{width:`${percent}%`}}></div></div><p className="mt-3 text-sm opacity-70">Streak: {progress.streak?.count || 0} วัน · ควรทบทวนวันนี้ {dueItems.length} รายการ</p></div><div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-red-950/75':'bg-white/90'}`}><h3 className="font-black mb-3"><i className="fas fa-clock-rotate-left mr-2 text-amber-600"></i>คิวทบทวนแบบ Spaced Repetition</h3>{topDue.length ? <div className="grid grid-cols-4 gap-2">{topDue.map((v,i)=><div key={i} className="p-3 rounded-2xl bg-amber-100/80 text-red-950 text-center"><div className="text-2xl font-serif font-bold">{v.text}</div><div className="text-xs">{v.pinyin}</div></div>)}</div> : <p className="text-sm opacity-65">ยังไม่มีคิวค้าง ดีงามเหมือนโต๊ะทำงานก่อนเริ่มประชุมค่ะ 😄</p>}</div><div className={`p-5 rounded-3xl ${isDarkMode?'bg-red-950/75':'bg-white/90'}`}><h3 className="font-black mb-2">Badge</h3><div className="grid grid-cols-2 gap-2 text-sm">{[['初学者','ผู้เริ่มต้น',done>=1],['拼音达人','เซียนพินอิน',done>=30],['汉字小师傅','ครูน้อยอักษรจีน',done>=80],['中医词汇','ศัพท์สุขภาพจีน',done>=120]].map((b,i)=><div key={i} className={`p-3 rounded-2xl border ${b[2]?'bg-amber-100 border-amber-300 text-red-950':'opacity-40 border-gray-300'}`}><b>{b[0]}</b><p>{b[1]}</p></div>)}</div></div></div>;
      };

      const renderSummary = () => {
        const isGameSummary = currentView === 'gameSummary';
        const stars = selectedMode === 'practice' || isGameSummary ? calculateStars() : 0;
        const learned = currentLessonItem.chars || [];
        const reviewText = learned.slice(0,6).map(c => `${c.kana} ${c.romaji}`).join(' · ');
        return <div className={`flex flex-col h-full p-6 overflow-y-auto custom-scrollbar animate-in zoom-in duration-500 relative z-10 ${isDarkMode?'text-amber-100':'text-red-950'}`}>
          <div className="text-center mb-5">{selectedMode==='practice'||isGameSummary?<div className="flex justify-center space-x-2 mb-5">{[1,2,3].map(star=><i key={star} className={`fas fa-star text-5xl ${star<=stars?'text-[#D4A017] drop-shadow-lg':'text-gray-300'}`}></i>)}</div>:<i className="fas fa-award text-6xl text-[#D4A017] mb-4 drop-shadow-md"></i>}<h2 className={`text-3xl font-black ${isDarkMode?'gold-sheen':'text-[#5B2118]'}`}>{isGameSummary?'จบเกมแล้วค่ะ!':'สรุปบทเรียน'}</h2><p className="opacity-70 text-sm mt-2">{isGameSummary?'ทบทวนพินอินกับตัวจีนต่ออีกนิด เก่งขึ้นแน่นอนค่ะ':currentLessonItem.title}</p></div>
          <div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-red-950/75 border border-amber-700/35':'bg-white/95 border border-amber-200'}`}><h3 className="font-black mb-2"><i className="fas fa-clipboard-check mr-2 text-amber-600"></i>Lesson Summary</h3><p className="text-sm opacity-75">วันนี้เรียน/ฝึก: {reviewText || '—'}</p><p className="text-sm opacity-75 mt-1">จำนวนรายการในบทนี้: <b>{learned.length}</b> · คะแนนสะสม: <b>{isGameSummary?gameScore:score}</b></p><div className="grid grid-cols-3 gap-2 mt-3 text-center text-xs"><div className="p-2 rounded-xl bg-amber-100 text-red-950"><b>เสียง</b><p>พินอิน/โทน</p></div><div className="p-2 rounded-xl bg-amber-100 text-red-950"><b>เขียน</b><p>ขีด/สัดส่วน</p></div><div className="p-2 rounded-xl bg-amber-100 text-red-950"><b>ใช้จริง</b><p>คำ/ประโยค</p></div></div></div>
          <div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-red-950/75':'bg-white/95'}`}><h3 className="font-black mb-2">คำแนะนำรอบถัดไป</h3><ul className="list-disc pl-5 text-sm space-y-1 opacity-80"><li>ตัวที่ยังไม่มั่นใจให้กด “ยังยาก” เพื่อเข้า Spaced Repetition</li><li>ฝึกจากรากศัพท์ก่อน แล้วค่อยจำคำศัพท์ประกอบ</li><li>ใช้ Quiz อย่างน้อย 5 ข้อต่อวัน เพื่อเชื่อมจีน–พินอิน–ความหมายไทย</li></ul></div>
          <div className="grid grid-cols-2 gap-3"><button onClick={()=>setCurrentView(isGameSummary?'menu':'lessonSelect')} className={`px-6 py-4 text-white rounded-2xl font-bold shadow-[0_4px_0_#35130e] ${isDarkMode?'bg-amber-700':'bg-[#5B2118]'}`}>กลับบทเรียน</button><button onClick={()=>setCurrentView('dashboard')} className="px-6 py-4 text-white rounded-2xl font-bold shadow-[0_4px_0_#7f1d1d] bg-[#B91C1C]">ดู Dashboard</button></div>
        </div>;
      };


      return (
        <div className={`w-full h-full relative font-sans flex flex-col transition-colors duration-500 ${isDarkMode?'bg-[#160f0c]':'bg-[#fff7ed]'}`}>
          <div className={`chinese-bg ${isDarkMode?'bg-dark-pattern':'bg-light-pattern'}`}></div>
          <div className={`h-6 w-full flex justify-between items-center px-4 text-xs font-semibold z-50 pt-2 pb-6 shrink-0 relative ${isDarkMode?'text-amber-200':'text-[#5B2118]'}`}><span>9:41 AM</span><div className="flex space-x-1 items-center"><span>100%</span><div className={`w-6 h-3 border rounded-[3px] p-[1px] ${isDarkMode?'border-amber-200':'border-[#5B2118]'}`}><div className={`w-full h-full rounded-[1px] ${isDarkMode?'bg-amber-200':'bg-[#5B2118]'}`}></div></div></div></div>
          <div className="flex-1 relative overflow-hidden">
            {currentView === 'menu' && renderMenu()}
            {currentView === 'settings' && renderSettings()}
            {currentView === 'pathMap' && renderPathMap()}
            {currentView === 'exerciseHub' && renderExerciseHub()}
            {currentView === 'lessonSelect' && renderLessonSelect()}
            {currentView === 'lessonIntro' && renderLessonIntro()}
            {(currentView === 'learn' || currentView === 'practice') && renderCanvasView()}
            {currentView === 'game' && renderMiniGame()}
            {currentView === 'toneLab' && renderToneLab()}
            {currentView === 'dashboard' && renderDashboard()}
            {(currentView === 'summary' || currentView === 'gameSummary') && renderSummary()}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChineseWritingApp />);
  </script>
</body>
</html>
