<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 マスター — เรียนญี่ปุ่นครบจบในที่เดียว</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f6ef;
  --sidebar-bg: #1c1c2e;
  --primary: #1c1c2e;
  --accent: #c0392b;
  --accent2: #e67e22;
  --teal: #1a6b7c;
  --gold: #b8860b;
  --paper: #f0ead8;
  --text: #1a1a1a;
  --text-light: #666;
  --border: #d9ceb6;
  --card: #ffffff;
  --success: #27ae60;
  --level-n5: #3498db;
  --level-n4: #27ae60;
  --level-n3: #e67e22;
  --level-biz: #8e44ad;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--sidebar-bg);
  color: #eee;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  position: relative;
}
#sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: linear-gradient(135deg, #1c1c2e 0%, #2d1b4e 100%);
}
#sidebar-header .app-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: #fff;
  letter-spacing: 2px;
}
#sidebar-header .app-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  font-family: 'Sarabun', sans-serif;
}
.level-group { margin-bottom: 4px; }
.level-header {
  padding: 10px 20px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.nav-item {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  gap: 10px;
}
.nav-item:hover { background: rgba(255,255,255,0.07); }
.nav-item.active {
  background: rgba(255,255,255,0.1);
  border-left-color: var(--accent);
  color: #fff;
}
.nav-item .num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.nav-item .lesson-title { font-size: 13px; line-height: 1.3; }
.nav-item .lesson-jp { font-size: 10px; color: rgba(255,255,255,0.4); font-family: 'Noto Sans JP', sans-serif; }
.badge-n5 { background: var(--level-n5); color: #fff; }
.badge-n4 { background: var(--level-n4); color: #fff; }
.badge-n3 { background: var(--level-n3); color: #fff; }
.badge-biz { background: var(--level-biz); color: #fff; }
.sidebar-progress {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: auto;
}
.progress-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }

/* MAIN */
#main {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#topbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}
#topbar .lesson-breadcrumb { font-size: 13px; color: var(--text-light); }
#topbar .lesson-main-title { font-size: 18px; font-weight: 700; color: var(--primary); }
#topbar .lesson-jp-title { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--accent); margin-left: auto; }
#content { padding: 32px; max-width: 860px; }

/* LESSON COMPONENTS */
.lesson-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #2d1b4e 100%);
  color: white;
  padding: 32px;
  border-radius: 16px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.lesson-hero::before {
  content: attr(data-jp);
  font-family: 'Noto Serif JP', serif;
  font-size: 120px;
  position: absolute;
  right: -20px; top: -20px;
  opacity: 0.06;
  line-height: 1;
  pointer-events: none;
}
.lesson-hero .hero-level { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-bottom: 8px; }
.lesson-hero .hero-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.lesson-hero .hero-subtitle { font-family: 'Noto Serif JP', serif; font-size: 18px; opacity: 0.7; margin-bottom: 12px; }
.lesson-hero .hero-desc { font-size: 14px; opacity: 0.8; line-height: 1.7; max-width: 500px; }

.section-title {
  font-size: 16px; font-weight: 700;
  color: var(--primary);
  margin: 28px 0 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-title .jp { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--text-light); font-weight: 400; }

/* HIRAGANA TABLE */
.kana-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.kana-table th {
  background: var(--primary);
  color: #fff;
  padding: 6px 4px;
  font-size: 11px;
  text-align: center;
  font-family: 'Sarabun', sans-serif;
  font-weight: 400;
}
.kana-cell {
  border: 1px solid var(--border);
  text-align: center;
  padding: 8px 4px;
  cursor: pointer;
  transition: all 0.15s;
  background: #fff;
}
.kana-cell:hover { background: var(--accent); }
.kana-cell:hover .kana-char, .kana-cell:hover .kana-roman { color: #fff; }
.kana-char { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; display: block; color: var(--primary); }
.kana-roman { font-size: 10px; color: var(--text-light); display: block; margin-top: 2px; font-weight: 600; }
.kana-cell.empty { background: var(--bg); cursor: default; }
.kana-cell.empty:hover { background: var(--bg); }

/* VOCAB CARDS */
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.vocab-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.vocab-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); border-color: var(--accent); }
.vocab-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 22px; color: var(--primary); margin-bottom: 4px; }
.vocab-reading { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
.vocab-th { font-size: 13px; color: var(--text-light); }
.vocab-sound { position: absolute; top: 8px; right: 8px; font-size: 14px; opacity: 0.3; }
.vocab-card:hover .vocab-sound { opacity: 1; }

/* GRAMMAR BOX */
.grammar-box {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.grammar-pattern {
  background: var(--primary);
  color: #fff;
  padding: 10px 16px;
  border-radius: 8px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.grammar-meaning { font-size: 13px; color: var(--text-light); margin-bottom: 12px; }
.grammar-examples { list-style: none; }
.grammar-examples li {
  padding: 8px 12px;
  border-left: 3px solid var(--teal);
  margin-bottom: 8px;
  background: #f8f8f8;
  border-radius: 0 8px 8px 0;
}
.example-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: var(--primary); }
.example-reading { font-size: 11px; color: var(--accent); margin-top: 2px; }
.example-th { font-size: 12px; color: var(--text-light); margin-top: 2px; }

/* DIALOGUE */
.dialogue-box {
  background: var(--paper);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.dialogue-title { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
.dialogue-line { display: flex; gap: 12px; margin-bottom: 14px; }
.dialogue-speaker {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.speaker-a { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; }
.speaker-b { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; }
.dialogue-bubble { flex: 1; }
.bubble-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: var(--primary); margin-bottom: 3px; }
.bubble-reading { font-size: 11px; color: var(--accent); margin-bottom: 2px; }
.bubble-th { font-size: 12px; color: var(--text-light); }

/* PARTICLES */
.particle-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
.particle-table th { background: var(--primary); color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; }
.particle-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
.particle-table tr:last-child td { border-bottom: none; }
.particle-table tr:nth-child(even) td { background: #fafafa; }
.particle-mark { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--accent); font-weight: 700; }

/* QUIZ */
.quiz-box {
  background: linear-gradient(135deg, #667eea22, #764ba222);
  border: 2px solid #764ba255;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.quiz-q { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quiz-opt {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.quiz-opt:hover { border-color: var(--teal); background: #f0f9fb; }
.quiz-opt.correct { border-color: var(--success); background: #eafaf1; color: var(--success); }
.quiz-opt.wrong { border-color: var(--accent); background: #fdf2f0; color: var(--accent); }
.quiz-result { margin-top: 12px; font-size: 14px; font-weight: 600; display: none; }

/* BIZ PHRASES */
.biz-card {
  background: linear-gradient(135deg, #1c1c2e, #2d1b4e);
  color: #fff;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 10px;
}
.biz-situation { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.biz-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; margin-bottom: 4px; }
.biz-reading { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 6px; }
.biz-th { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 4px; }
.biz-note { font-size: 11px; color: var(--accent2); background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 6px; margin-top: 6px; }

/* NAV BUTTONS */
.lesson-nav { display: flex; gap: 12px; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--border); }
.btn-nav {
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Sarabun', sans-serif;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-prev { background: #fff; border: 2px solid var(--border); color: var(--text); }
.btn-prev:hover { border-color: var(--primary); }
.btn-next { background: var(--accent); color: #fff; margin-left: auto; }
.btn-next:hover { background: #a93226; transform: translateX(2px); }

/* SPEECH BUBBLE for tips */
.tip-box {
  background: #fff3e0;
  border-left: 4px solid var(--accent2);
  padding: 14px 16px;
  border-radius: 0 10px 10px 0;
  margin-bottom: 16px;
  font-size: 13px;
  color: #7f5200;
}
.tip-box strong { color: var(--accent2); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

/* Number highlight */
.highlight { color: var(--accent); font-weight: 700; }
.jp-text { font-family: 'Noto Sans JP', sans-serif; }

/* Level badge */
.level-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.badge-text-n5 { background: #ebf5fb; color: var(--level-n5); }
.badge-text-n4 { background: #e9f7ef; color: var(--level-n4); }
.badge-text-n3 { background: #fef9e7; color: var(--level-n3); }
.badge-text-biz { background: #f5eef8; color: var(--level-biz); }

.intro-text { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 16px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="sidebar-header">
    <div class="app-title">日本語 マスター</div>
    <div class="app-sub">หลักสูตรภาษาญี่ปุ่น ตั้งแต่ 0 ถึงธุรกิจ</div>
  </div>
  <div id="nav-list"></div>
  <div class="sidebar-progress">
    <div class="progress-label">ความคืบหน้า: <span id="progress-text">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</nav>

<!-- MAIN -->
<main id="main">
  <div id="topbar">
    <div>
      <div class="lesson-breadcrumb" id="tb-breadcrumb">เริ่มต้น</div>
      <div class="lesson-main-title" id="tb-title">ยินดีต้อนรับ</div>
    </div>
    <div class="lesson-jp-title" id="tb-jp"></div>
  </div>
  <div id="content"></div>
</main>

<script>
// ====================== LESSONS DATA ======================
const LESSONS = [
  // ===== N5 =====
  {
    id: 0, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'ฮิรางานะ', jp: 'ひらがな',
    desc: 'ตัวอักษรหลักของภาษาญี่ปุ่น 46 ตัว พื้นฐานสำคัญที่สุด',
    render: renderHiragana
  },
  {
    id: 1, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'คาตากานะ', jp: 'カタカナ',
    desc: 'ตัวอักษรสำหรับคำทับศัพท์และคำต่างชาติ',
    render: renderKatakana
  },
  {
    id: 2, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'การทักทายพื้นฐาน', jp: '挨拶',
    desc: 'สวัสดี ขอบคุณ ขอโทษ — ประโยคแรกที่ต้องรู้',
    render: renderGreetings
  },
  {
    id: 3, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'ตัวเลขและเวลา', jp: '数字と時間',
    desc: 'นับเลข 1-100 บอกเวลา วัน เดือน ปี',
    render: renderNumbers
  },
  {
    id: 4, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'ไวยากรณ์ です / ます', jp: 'です・ます形',
    desc: 'โครงสร้างประโยคพื้นฐาน รูปสุภาพ',
    render: renderDesuMasu
  },
  {
    id: 5, level: 'n5', levelLabel: 'N5 เริ่มต้น',
    title: 'อนุภาค は が を に', jp: '助詞',
    desc: 'หัวใจสำคัญของไวยากรณ์ญี่ปุ่น',
    render: renderParticles
  },
  // ===== N4 =====
  {
    id: 6, level: 'n4', levelLabel: 'N4 กลาง',
    title: 'กริยากลุ่มต่างๆ', jp: '動詞グループ',
    desc: 'กริยากลุ่ม 1, 2, 3 และการผันรูป',
    render: renderVerbs
  },
  {
    id: 7, level: 'n4', levelLabel: 'N4 กลาง',
    title: 'รูปて / ている', jp: 'て形・ている',
    desc: 'กริยารูปเชื่อม การกระทำต่อเนื่อง',
    render: renderTeForm
  },
  {
    id: 8, level: 'n4', levelLabel: 'N4 กลาง',
    title: 'การขอร้องและอนุญาต', jp: '依頼と許可',
    desc: 'ขอร้อง ขออนุญาต ให้อนุญาต',
    render: renderRequest
  },
  {
    id: 9, level: 'n4', levelLabel: 'N4 กลาง',
    title: 'คำคุณศัพท์ い / な', jp: 'い形容詞・な形容詞',
    desc: 'บรรยายสิ่งของและความรู้สึก',
    render: renderAdjectives
  },
  // ===== N3 =====
  {
    id: 10, level: 'n3', levelLabel: 'N3 กลาง-สูง',
    title: 'ไวยากรณ์เชื่อมประโยค', jp: '接続文法',
    desc: 'เพราะว่า แต่ว่า แม้ว่า เมื่อ',
    render: renderConjunctions
  },
  {
    id: 11, level: 'n3', levelLabel: 'N3 กลาง-สูง',
    title: 'การแสดงความคิดเห็น', jp: '意見表現',
    desc: 'คิดว่า ดูเหมือนว่า ได้ยินว่า',
    render: renderOpinions
  },
  // ===== BUSINESS =====
  {
    id: 12, level: 'biz', levelLabel: 'ธุรกิจ',
    title: 'ภาษาสุภาพพิเศษ', jp: '敬語',
    desc: 'Keigo — ภาษาที่ใช้ในที่ทำงานอย่างเป็นทางการ',
    render: renderKeigo
  },
  {
    id: 13, level: 'biz', levelLabel: 'ธุรกิจ',
    title: 'การทักทายในที่ทำงาน', jp: 'ビジネス挨拶',
    desc: 'ทักทาย แนะนำตัว มอบนามบัตร',
    render: renderBizGreeting
  },
  {
    id: 14, level: 'biz', levelLabel: 'ธุรกิจ',
    title: 'อีเมลและการติดต่อ', jp: 'ビジネスメール',
    desc: 'เขียนอีเมล โทรศัพท์ นัดหมาย',
    render: renderBizEmail
  },
  {
    id: 15, level: 'biz', levelLabel: 'ธุรกิจ',
    title: 'การประชุมและนำเสนอ', jp: '会議・プレゼン',
    desc: 'เปิดประชุม นำเสนอ สรุป',
    render: renderBizMeeting
  },
];

let currentLesson = 0;
let visitedLessons = new Set([0]);

// ====================== RENDER FUNCTIONS ======================

function renderHiragana(lesson) {
  const rows = [
    [['あ','a'],['い','i'],['う','u'],['え','e'],['お','o']],
    [['か','ka'],['き','ki'],['く','ku'],['け','ke'],['こ','ko']],
    [['さ','sa'],['し','shi'],['す','su'],['せ','se'],['そ','so']],
    [['た','ta'],['ち','chi'],['つ','tsu'],['て','te'],['と','to']],
    [['な','na'],['に','ni'],['ぬ','nu'],['ね','ne'],['の','no']],
    [['は','ha'],['ひ','hi'],['ふ','fu'],['へ','he'],['ほ','ho']],
    [['ま','ma'],['み','mi'],['む','mu'],['め','me'],['も','mo']],
    [['や','ya'],null,['ゆ','yu'],null,['よ','yo']],
    [['ら','ra'],['り','ri'],['る','ru'],['れ','re'],['ろ','ro']],
    [['わ','wa'],null,null,null,['を','wo']],
    [['ん','n'],null,null,null,null],
  ];

// ====================== HELPERS ======================
function hero(lesson, emoji) {
  const levelClass = { n5:'badge-text-n5', n4:'badge-text-n4', n3:'badge-text-n3', biz:'badge-text-biz' }[lesson.level];
  return `<div class="lesson-hero" data-jp="${lesson.jp}">
    <div class="hero-level">${emoji} ${lesson.levelLabel}</div>
    <div class="hero-title">${lesson.title}</div>
    <div class="hero-subtitle">${lesson.jp}</div>
    <div class="hero-desc">${lesson.desc}</div>
  </div>`;
}
function makeVocab(jp, reading, th) {
  return `<div class="vocab-card" onclick="speak('${jp}')">
    <div class="vocab-jp">${jp}</div>
    <div class="vocab-reading">${reading}</div>
    <div class="vocab-th">${th}</div>
    <span class="vocab-sound">🔊</span>
  </div>`;
}
function dlg(speaker, jp, reading, th) {
  const cls = speaker === 'A' ? 'speaker-a' : 'speaker-b';
  return `<div class="dialogue-line">
    <div class="dialogue-speaker ${cls}">${speaker}</div>
    <div class="dialogue-bubble">
      <div class="bubble-jp">${jp}</div>
      <div class="bubble-reading">${reading}</div>
      <div class="bubble-th">${th}</div>
    </div>
  </div>`;
}
function bizCard(situation, jp, reading, th, note) {
  return `<div class="biz-card">
    <div class="biz-situation">${situation}</div>
    <div class="biz-jp">${jp}</div>
    <div class="biz-reading">${reading}</div>
    <div class="biz-th">${th}</div>
    ${note ? `<div class="biz-note">💡 ${note}</div>` : ''}
  </div>`;
}
let quizCounter = 0;
function quizBox(q, opts, correct) {
  const id = 'quiz-' + (quizCounter++);
  return `<div class="quiz-box">
    <div class="quiz-q">🧠 ทดสอบ: ${q}</div>
    <div class="quiz-options" id="${id}">
      ${opts.map(o=>`<button class="quiz-opt" onclick="checkQuiz('${id}','${o.replace(/'/g,"\\'")}','${correct.replace(/'/g,"\\'")}',this)">${o}</button>`).join('')}
    </div>
    <div class="quiz-result" id="${id}-result"></div>
  </div>`;
}

// ====================== APP LOGIC ======================
function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP'; u.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  }
}
function checkQuiz(id, chosen, correct, btn) {
  const container = document.getElementById(id);
  const result = document.getElementById(id+'-result');
  container.querySelectorAll('.quiz-opt').forEach(b => { b.disabled = true; });
  if (chosen === correct) {
    btn.classList.add('correct');
    result.textContent = '✅ ถูกต้อง! เก่งมากค่ะ';
    result.style.color = 'var(--success)';
  } else {
    btn.classList.add('wrong');
    container.querySelectorAll('.quiz-opt').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
    result.textContent = `❌ คำตอบที่ถูกคือ: ${correct}`;
    result.style.color = 'var(--accent)';
  }
  result.style.display = 'block';
}

function buildNav() {
  const groups = {};
  LESSONS.forEach(l => {
    if (!groups[l.level]) groups[l.level] = { label: l.levelLabel, items: [] };
    groups[l.level].items.push(l);
  });
  const navEl = document.getElementById('nav-list');
  let html = '';
  for (const [lvl, g] of Object.entries(groups)) {
    const badgeClass = `badge-${lvl}`;
    html += `<div class="level-group">
      <div class="level-header">${g.label}</div>`;
    g.items.forEach(l => {
      html += `<div class="nav-item ${l.id===0?'active':''}" id="nav-${l.id}" onclick="goLesson(${l.id})">
        <span class="num ${badgeClass}">${l.id+1}</span>
        <div>
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-jp">${l.jp}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  navEl.innerHTML = html;
}

function goLesson(id) {
  currentLesson = id;
  visitedLessons.add(id);
  const l = LESSONS[id];
  quizCounter = 0;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${id}`).classList.add('active');
  document.getElementById(`nav-${id}`).scrollIntoView({ block: 'nearest' });
  document.getElementById('tb-breadcrumb').textContent = l.levelLabel + ' › บทที่ ' + (id+1);
  document.getElementById('tb-title').textContent = l.title;
  document.getElementById('tb-jp').textContent = l.jp;
  let html = l.render(l);
  html += `<div class="lesson-nav">
    ${id > 0 ? `<button class="btn-nav btn-prev" onclick="goLesson(${id-1})">← บทก่อนหน้า</button>` : ''}
    ${id < LESSONS.length-1 ? `<button class="btn-nav btn-next" onclick="goLesson(${id+1})">บทถัดไป →</button>` : '<div style="margin-left:auto;font-weight:700;color:var(--accent)">🎉 จบหลักสูตรแล้ว!</div>'}
  </div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
  const pct = Math.round(visitedLessons.size / LESSONS.length * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

buildNav();
goLesson(0);
</script>
