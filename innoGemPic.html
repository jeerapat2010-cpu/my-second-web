// ── ERROR BOUNDARY ────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorInfo: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, errorInfo: error.toString() };
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: 40, textAlign: 'center', color: '#c62828' }}>
          <h2>เกิดข้อผิดพลาดในการแสดงผลหน้าจอ (Render Error)</h2>
          <p>กรุณาตรวจสอบโครงสร้างข้อมูลที่ใช้งาน</p>
          <pre style={{ background:'#fff', padding:10, borderRadius:8, textAlign:'left', maxWidth:800, margin:'0 auto' }}>
            {this.state.errorInfo}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

const ScoreBar = ({ val, max = 20, color = "#9a7a00", idx = 0 }) => {
  const c = color !== "#9a7a00" ? color : CRIT_COLORS[idx % CRIT_COLORS.length];
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div style={{ flex:1, background:"#f5f5f5", borderRadius:6, height:9, overflow:"hidden" }}>
        <div style={{ width:`${(val/max)*100}%`, background:c, height:"100%", borderRadius:6, transition:"width 0.6s ease" }} />
      </div>
      <span style={{ fontSize:13, fontWeight:700, color:c, minWidth:22 }}>{val}</span>
    </div>
  );
};

            <ul style={{ margin:0, paddingLeft:16 }}>
              {item.strengths.map((s,i)=><li key={i} style={{ fontSize:13, color:"#333", marginBottom:4 }}>{s}</li>)}
            </ul>
          </Section>
          {/* Improvements */}
          <Section title="จุดที่ต้องพัฒนา" colorIdx={5}>
            <ul style={{ margin:0, paddingLeft:16 }}>
              {item.improvements.map((s,i)=><li key={i} style={{ fontSize:13, color:"#555", marginBottom:4 }}>{s}</li>)}
            </ul>
          </Section>
          {/* Recs */}
          <Section title="ข้อเสนอแนะ" colorIdx={6}>
            <ul style={{ margin:0, paddingLeft:16 }}>
              {item.recs.map((s,i)=><li key={i} style={{ fontSize:13, color:"#444", marginBottom:4 }}>{s}</li>)}
            </ul>
          </Section>
          {/* Summary */}
          <div style={{ background:"#fffbf0", border:"1px solid #e8c840", borderRadius:12, padding:"12px 16px", marginTop:12 }}>
            <p style={{ fontSize:13, color:"#5c4500", fontWeight:600, margin:0 }}>{item.summary}</p>
          </div>
          {/* Comments */}
          {item.comments && item.comments.length > 0 && (
            <Section title="คอมเม้นท์เพิ่มเติม">
              {item.comments.map((c,i)=>(
                <div key={i} style={{ background:"#f9f9f9", borderRadius:8, padding:"8px 12px", marginBottom:6, fontSize:13 }}>
                  <div style={{ color:"#888", fontSize:11, marginBottom:2 }}>{c.date}</div>
                  <div style={{ color:"#333" }}>{c.text}</div>
                </div>
              ))}
            </Section>
          )}
          {/* Actions */}
          <div style={{ display:"flex", gap:10, marginTop:16 }}>
            <button onClick={()=>onEdit(item)} style={{ flex:1, background:"#9a7a00", color:"#fff", border:"none", borderRadius:12, padding:"10px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              ✏️ แก้ไขคะแนน / เพิ่มคอมเม้นท์
            </button>
            <button onClick={onClose} style={{ flex:1, background:"#fffbf0", color:"#9a7a00", border:"1px solid #e8c840", borderRadius:12, padding:"10px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>
              ✕ ปิด
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

const Section = ({ title, children, colorIdx = 0 }) => {
  const c = SECTION_COLORS[colorIdx % SECTION_COLORS.length];
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ fontSize:12, fontWeight:700, color:c, textTransform:"uppercase", letterSpacing:1, marginBottom:7, borderLeft:`3px solid ${c}`, paddingLeft:8 }}>{title}</div>
      {children}
    </div>
  );
};

// ── MODAL: EDIT ─────────────────────────────────────────────────────────────
const EditModal = ({ item, onClose, onSave }) => {
  const [userScore, setUserScore] = useState(getScore(item));
  const [comment, setComment] = useState("");
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:450, padding:24 }}>
        <h3 style={{ color:"#9a7a00", margin:"0 0 16px" }}>✏️ แก้ไข: {item.name ? item.name.substring(0,30) : ""}...</h3>
        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:13, color:"#555", display:"block", marginBottom:6 }}>คะแนนของคุณ (0-100)</label>
          <input type="number" min="0" max="100" value={userScore} onChange={e=>setUserScore(+e.target.value)}
            style={{ width:"100%", padding:"10px 14px", border:"1px solid #e8c840", borderRadius:10, fontSize:15, color:"#5c4500", fontWeight:700, boxSizing:"border-box" }} />
          <div style={{ fontSize:11, color:"#888", marginTop:4 }}>คะแนนเดิม: {item.total}/100</div>
        </div>
        <div style={{ marginBottom:16 }}>
          <label style={{ fontSize:13, color:"#555", display:"block", marginBottom:6 }}>เพิ่มคอมเม้นท์</label>
          <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={3}
            placeholder="พิมพ์คอมเม้นท์ของคุณที่นี่..."
            style={{ width:"100%", padding:"10px 14px", border:"1px solid #e8c840", borderRadius:10, fontSize:13, resize:"vertical", boxSizing:"border-box" }} />
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <button onClick={()=>onSave(item.id, userScore, comment)} style={{ flex:1, background:"#9a7a00", color:"#fff", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            💾 บันทึก
          </button>
          <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#555", border:"1px solid #ddd", borderRadius:12, padding:"11px 0", fontSize:13, cursor:"pointer" }}>
            ยกเลิก
          </button>
        </div>
      </div>
    </div>
  );
};

// ── MODAL: IMPORT ───────────────────────────────────────────────────────────
const ImportModal = ({ onClose, onImport }) => {
  const [text, setText] = useState("");
  const fileRef = useRef();
  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = (ev) => setText(ev.target.result);
    r.readAsText(f);
  };
  const handleImport = () => {
    try {
      const data = JSON.parse(text);
      if (Array.isArray(data)) { onImport(data); onClose(); }
      else alert("ไฟล์ JSON ต้องเป็น array ของผลงาน");
    } catch(e) { alert("ไฟล์ JSON ไม่ถูกต้อง"); }
  };
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:20, width:"100%", maxWidth:500, padding:24 }}>
        <h3 style={{ color:"#9a7a00", margin:"0 0 8px" }}>📥 นำเข้าข้อมูล</h3>
        <p style={{ fontSize:13, color:"#666", margin:"0 0 16px" }}>รองรับไฟล์ JSON ที่ export จากระบบนี้ หรือ paste JSON ตรงๆ ด้านล่าง</p>
        <input type="file" ref={fileRef} accept=".json" onChange={handleFile} style={{ marginBottom:12 }} />
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={6}
          placeholder='[{"id":22,"name":"ชื่อนวัตกรรม",...}]'
          style={{ width:"100%", padding:"10px 14px", border:"1px solid #e8c840", borderRadius:10, fontSize:12, resize:"vertical", boxSizing:"border-box", fontFamily:"monospace" }} />
        <div style={{ display:"flex", gap:10, marginTop:12 }}>
          <button onClick={handleImport} style={{ flex:1, background:"#9a7a00", color:"#fff", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:600, cursor:"pointer" }}>
            📥 นำเข้าข้อมูล
          </button>
          <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#555", border:"1px solid #ddd", borderRadius:12, padding:"11px 0", fontSize:13, cursor:"pointer" }}>
            ยกเลิก
          </button>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: DASHBOARD ─────────────────────────────────────────────────────────
const Dashboard = ({ items, onSelect }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = (items.reduce((s,x)=>s+getScore(x),0)/items.length).toFixed(1);
  const passed = items.filter(x=>getScore(x)>=70).length;
  const top5 = sorted.slice(0,5);

  const byAmphoe = Object.entries(
    items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; return acc; },{})
  ).map(([name,{sum,n}])=>({ name, avg:+(sum/n).toFixed(1), count:n, n:n })).sort((a,b)=>b.avg-a.avg);

  const byType = Object.entries(
    items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||0)+1; return acc; },{})
  ).map(([name,value])=>({ name, value })).sort((a,b)=>b.value-a.value);

  const top10 = sorted.slice(0,10).map(x=>({ name:x.name ? x.name.substring(0,14)+"…" : "", score:getScore(x), id:x.id }));

  const statusData = Object.entries(
    items.reduce((acc,x)=>{ acc[x.status]=(acc[x.status]||0)+1; return acc; },{})
  ).map(([name,value])=>({ name, value }));

  const KPI = ({val,sub,grad,icon,textColor}) => (
    <div style={{ background:grad, borderRadius:16, padding:"16px 20px", flex:1, boxShadow:"0 4px 16px rgba(0,0,0,0.1)", border:"none" }}>
      <div style={{ fontSize:24, marginBottom:4 }}>{icon}</div>
      <div style={{ fontSize:26, fontWeight:700, color:textColor||"#fff" }}>{val}</div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.85)" }}>{sub}</div>
    </div>
  );

  return (
    <div>
      {/* KPIs */}
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:20 }}>
        <KPI val={items.length} sub="ผลงานทั้งหมด" grad="linear-gradient(135deg,#5c4500,#9a7a00)" icon="🏺" />
        <KPI val={avg} sub="คะแนนเฉลี่ย / 100" grad="linear-gradient(135deg,#9a7a00,#c49b0a)" icon="📊" />
        <KPI val={passed} sub={`ผ่านเกณฑ์ดี (≥70)`} grad="linear-gradient(135deg,#c49b0a,#e8b800)" icon="🏆" />
        <KPI val={top5.length > 0 ? getScore(top5[0]) : "-"} sub="คะแนนสูงสุด" grad="linear-gradient(135deg,#d4a017,#ffd700)" icon="⭐" />
      </div>

      {/* Top 5 */}
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
        <div style={{ fontSize:15, fontWeight:700, color:GOLD.dark, marginBottom:14 }}>🏆 Top 5 ผลงานดีเด่น</div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          {top5.map((item,idx)=>{
            const grads = [
              "linear-gradient(135deg,#b8960c,#ffd700,#e8b800)",
              "linear-gradient(135deg,#6b7280,#9ca3af,#d1d5db)",
              "linear-gradient(135deg,#92400e,#b45309,#d97706)",
              "linear-gradient(135deg,#5c4500,#9a7a00,#c49b0a)",
              "linear-gradient(135deg,#7b5e00,#b8960c,#d4a017)"
            ];
            const borders = ["#ffd700","#cbd5e1","#d97706","#e8c840","#f0c040"];
            return (
              <div key={item.id} onClick={()=>onSelect(item)} style={{ flex:"1 1 150px", background:grads[idx], borderRadius:14, padding:"14px 14px", cursor:"pointer", border:`2px solid ${borders[idx]}`, color:"#fff" }}>
                <div style={{ fontSize:22, marginBottom:4 }}>{["🥇","🥈","🥉","4️⃣","5️⃣"][idx]}</div>
                <div style={{ fontSize:26, fontWeight:800 }}>{getScore(item)}</div>
                <div style={{ fontSize:11, opacity:0.92, lineHeight:1.4, marginTop:2 }}>{item.name ? item.name.substring(0,30) : ""}</div>
                <div style={{ fontSize:10, opacity:0.75, marginTop:2 }}>{item.unit}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Charts row 1 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        {/* Top 10 bar */}
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:GOLD.dark, marginBottom:12, paddingLeft:8 }}>📊 Top 10 คะแนนรวม</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={top10} layout="vertical" margin={{left:0,right:24,top:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" horizontal={false} />
              <XAxis type="number" domain={[0,100]} tick={{fontSize:10}} />
              <YAxis type="category" dataKey="name" width={90} tick={{fontSize:9}} />
              <Tooltip formatter={(v)=>[v+" คะแนน","คะแนน"]} />
              <Bar dataKey="score" radius={[0,6,6,0]} onClick={(d)=>onSelect(items.find(x=>x.id===d.id))}>
                {top10.map((entry,index)=>(
                  <Cell key={index} fill={CHART_COLORS[index % CHART_COLORS.length]} />
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        {/* By amphoe */}
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:GOLD.main, marginBottom:12, paddingLeft:8 }}>🗺️ คะแนนเฉลี่ยตามอำเภอ</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={byAmphoe} margin={{left:0,right:24,top:0,bottom:20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" />
              <XAxis dataKey="name" tick={{fontSize:9}} angle={-30} textAnchor="end" />
              <YAxis domain={[0,100]} tick={{fontSize:10}} />
              <Tooltip formatter={(v,n,p)=>[v.toFixed(1)+" คะแนน ("+p.payload.count+" ผลงาน)","เฉลี่ย"]} />
              <Bar dataKey="avg" radius={[6,6,0,0]}>
                {byAmphoe.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Charts row 2 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        {/* Pie: type */}
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:GOLD.medium, marginBottom:12, paddingLeft:8 }}>🏷️ สัดส่วนตามประเภท</div>
          <div style={{ display:"flex", alignItems:"center" }}>
            <ResponsiveContainer width={160} height={160}>
              <PieChart>
                <Pie data={byType} cx="50%" cy="50%" innerRadius={40} outerRadius={70} dataKey="value" paddingAngle={3}>
                  {byType.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}
                </Pie>
                <Tooltip />
              </PieChart>
            </ResponsiveContainer>
            <div style={{ flex:1, paddingLeft:8 }}>
              {byType.slice(0,8).map((e,i)=>(
                <div key={i} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                  <div style={{ width:10, height:10, borderRadius:2, background:CHART_COLORS[i%CHART_COLORS.length], flexShrink:0 }} />
                  <span style={{ fontSize:10, color:"#555" }}>{e.name}: {e.value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        {/* Status */}
        <div style={{ background:"#fff", borderRadius:16, padding:"16px 12px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1px solid #f0f0f0" }}>
          <div style={{ fontSize:14, fontWeight:700, color:GOLD.amber, marginBottom:12, paddingLeft:8 }}>🔬 สถานะงานวิจัย</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={statusData} layout="vertical" margin={{left:0,right:24}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f5f5f5" horizontal={false} />
              <XAxis type="number" tick={{fontSize:10}} />
              <YAxis type="category" dataKey="name" width={130} tick={{fontSize:9}} />
              <Tooltip />
              <Bar dataKey="value" radius={[0,6,6,0]}>
                {statusData.map((e,i)=><Cell key={i} fill={CHART_COLORS[(i+4)%CHART_COLORS.length]} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Amphoe Summary Table */}
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:16, boxShadow:"0 2px 12px rgba(184,150,12,0.1)", border:"2px solid #e8c840" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ fontSize:15, fontWeight:700, color:GOLD.dark }}>🗺️ สรุปผลงานนวัตกรรมรายอำเภอ</div>
          <div style={{ fontSize:12, color:GOLD.main, fontWeight:600 }}>รวมทั้งสิ้น {items.length} ผลงาน · {byAmphoe.length} อำเภอ</div>
        </div>

        {/* Card summary row */}
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:16 }}>
          {byAmphoe.map((a,i)=>{
            const ampItems = items.filter(x=>x.amphoe===a.name);
            const passCount = ampItems.filter(x=>getScore(x)>=70).length;
            const pct = Math.round((a.n/items.length)*100);
            return (
              <div key={i} style={{ flex:"1 1 130px", background:`linear-gradient(135deg,${CHART_COLORS[i%CHART_COLORS.length]}18,${CHART_COLORS[i%CHART_COLORS.length]}08)`, borderRadius:12, padding:"12px 14px", border:`2px solid ${CHART_COLORS[i%CHART_COLORS.length]}40`, textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:900, color:CHART_COLORS[i%CHART_COLORS.length], lineHeight:1 }}>{a.n}</div>
                <div style={{ fontSize:9, color:"#999", marginTop:1 }}>ผลงาน ({pct}%)</div>
                <div style={{ fontSize:12, fontWeight:800, color:GOLD.dark, marginTop:4 }}>อ.{a.name}</div>
                <div style={{ marginTop:6, background:"#f5f5f5", borderRadius:4, height:5, overflow:"hidden" }}>
                  <div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:4 }} />
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                  <span style={{ fontSize:10, color:GOLD.main, fontWeight:700 }}>เฉลี่ย {a.avg}</span>
                  <span style={{ fontSize:10, color:passCount===a.n?"#2e7d32":GOLD.amber, fontWeight:700 }}>ผ่าน {passCount}/{a.n} ({Math.round((passCount/a.n)*100)}%)</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* Detail table */}
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", minWidth:560 }}>
            <thead>
              <tr style={{ background:`linear-gradient(135deg,${GOLD.dark},${GOLD.main})` }}>
                {["อันดับ","อำเภอ","จำนวนนวัตกรรม","สัดส่วน (%)","เฉลี่ย","สูงสุด","ผ่านเกณฑ์ (≥70)","ดีเด่น (≥85)"].map((h,i)=>(
                  <th key={i} style={{ padding:"8px 10px", color:"#fde68a", fontSize:11, fontWeight:700, textAlign:i<=1?"left":"center", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {byAmphoe.map((a,i)=>{
                const ampItems = items.filter(x=>x.amphoe===a.name);
                const maxScore = Math.max(...ampItems.map(x=>getScore(x)));
                const passCount = ampItems.filter(x=>getScore(x)>=70).length;
                const excellCount = ampItems.filter(x=>getScore(x)>=85).length;
                const pct = ((a.n/items.length)*100).toFixed(1);
                const allPass = passCount === a.n;
                return (
                  <tr key={i} style={{ background:i%2===0?"#fffbf0":"#fef9e7", borderBottom:`1px solid ${CHART_COLORS[i%CHART_COLORS.length]}20` }}>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length], textAlign:"center" }}>
                      {["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"][i]||`${i+1}`}
                    </td>
                    <td style={{ padding:"9px 10px", fontSize:13, fontWeight:700, color:GOLD.dark }}>
                      อ.{a.name}
                    </td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                        <span style={{ background:CHART_COLORS[i%CHART_COLORS.length], color:"#fff", borderRadius:20, padding:"3px 14px", fontSize:14, fontWeight:900 }}>{a.n}</span>
                        <span style={{ fontSize:10, color:"#999" }}>ผลงาน</span>
                      </div>
                    </td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>
                      <div style={{ background:"#f5f5f5", borderRadius:6, height:10, overflow:"hidden", width:80, margin:"0 auto" }}>
                        <div style={{ width:`${(a.n/items.length)*100}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:6 }} />
                      </div>
                      <div style={{ fontSize:11, color:CHART_COLORS[i%CHART_COLORS.length], fontWeight:700, marginTop:2 }}>{pct}%</div>
                    </td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:15, fontWeight:900, color:GOLD.main }}>{a.avg}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center", fontSize:14, fontWeight:700, color:GOLD.dark }}>{maxScore}</td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>
                      <span style={{ background:allPass?"#e8f5e9":"#fff8e1", color:allPass?"#2e7d32":GOLD.amber, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:800, border:`1px solid ${allPass?"#66bb6a":"#fbbf24"}` }}>
                        {passCount} / {a.n} ({Math.round((passCount/a.n)*100)}%) {allPass?"✅":""}
                      </span>
                    </td>
                    <td style={{ padding:"9px 10px", textAlign:"center" }}>
                      {excellCount > 0
                        ? <span style={{ background:"#fff8e1", color:GOLD.dark, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:800, border:`1px solid #ffd700` }}>⭐ {excellCount} ผลงาน</span>
                        : <span style={{ color:"#ddd", fontSize:12 }}>—</span>}

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          {[
            { icon:"📈", title:"ผลงานที่มี R2R/Research", body:`${items.filter(x=>x.status.includes("R2R")||x.status.includes("วิจัย")).length} ผลงาน (${((items.filter(x=>x.status.includes("R2R")||x.status.includes("วิจัย")).length/items.length)*100).toFixed(0)}%) มีหลักฐานวิจัยจากงานประจำ`, bg:"linear-gradient(135deg,#fffbf0,#fef3c7)", tc:GOLD.dark },
            { icon:"🌿", title:"ประเภทที่พบมากที่สุด", body:`${byType[0] ? byType[0].name : ""} (${byType[0] ? byType[0].value : 0} ผลงาน) รองลงมา ${byType[1] ? byType[1].name : ""} (${byType[1] ? byType[1].value : 0} ผลงาน)`, bg:"linear-gradient(135deg,#fef9e7,#fde68a)", tc:GOLD.main },
            { icon:"🏅", title:"อำเภอที่มีคะแนนเฉลี่ยสูงสุด", body:`อ.${byAmphoe[0] ? byAmphoe[0].name : ""} เฉลี่ย ${byAmphoe[0] ? byAmphoe[0].avg : 0} คะแนน จาก ${byAmphoe[0] ? byAmphoe[0].count : 0} ผลงาน`, bg:"linear-gradient(135deg,#fff7ed,#fed7aa)", tc:GOLD.amber },
            { icon:"⚠️", title:"ผลงานที่ต้องพัฒนาเพิ่มเติม", body:`${items.filter(x=>getScore(x)<65).length} ผลงาน (คะแนน <65) ควรได้รับการสนับสนุนพิเศษ`, bg:"linear-gradient(135deg,#fef2f2,#fecaca)", tc:"#b91c1c" },
          ].map((ins,i)=>(

// ── PAGE: PRODUCT LIST ──────────────────────────────────────────────────────
const ProductList = ({ items, onSelect, onEdit, onImageUpdate }) => {
  const [search, setSearch] = useState("");
  const [filterAmphoe, setFilterAmphoe] = useState("ทั้งหมด");
  const [filterType, setFilterType] = useState("ทั้งหมด");
  const [filterStatus, setFilterStatus] = useState("ทั้งหมด");
  const [sortBy, setSortBy] = useState("score");

  const amphoes = ["ทั้งหมด",...[...new Set(items.map(x=>x.amphoe))]];
  const types = ["ทั้งหมด",...[...new Set(items.map(x=>x.type))]];
  const statuses = ["ทั้งหมด",...[...new Set(items.map(x=>x.status))]];

  const filtered = items.filter(x=>{
    const sc = search.toLowerCase();
    if (search && !(x.name && x.name.toLowerCase().includes(sc)) && !(x.unit && x.unit.toLowerCase().includes(sc))) return false;
    if (filterAmphoe!=="ทั้งหมด" && x.amphoe!==filterAmphoe) return false;
    if (filterType!=="ทั้งหมด" && x.type!==filterType) return false;
    if (filterStatus!=="ทั้งหมด" && x.status!==filterStatus) return false;
    return true;
  }).sort((a,b)=>{
    if(sortBy==="score") return getScore(b) - getScore(a);
    if(sortBy==="id") return a.id - b.id;
    if(sortBy==="name") return (a.name || "").localeCompare(b.name || "","th");
    return 0;
  });

  const handleImg = (id, e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = (ev) => { if (onImageUpdate) onImageUpdate(id, ev.target.result); };
    r.readAsDataURL(f);
  };

  const DD = ({val,opts,onChange,label}) => (
    <select value={val} onChange={e=>onChange(e.target.value)}
      style={{ padding:"8px 12px", border:"1px solid #e8c840", borderRadius:10, fontSize:12, color:"#9a7a00", background:"#fff", cursor:"pointer" }}>
      {opts.map(o=><option key={o}>{o}</option>)}
    </select>
  );

  return (
    <div>
      {/* Filters */}
      <div style={{ background:"#fff", borderRadius:16, padding:"14px 16px", marginBottom:16, boxShadow:"0 2px 8px rgba(184,150,12,0.08)", border:"1px solid #fffbf0", display:"flex", flexWrap:"wrap", gap:10, alignItems:"center" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ค้นหาชื่อ / หน่วยงาน..."
          style={{ flex:"1 1 180px", padding:"8px 14px", border:"1px solid #e8c840", borderRadius:10, fontSize:13, outline:"none" }} />
        <DD val={filterAmphoe} opts={amphoes} onChange={setFilterAmphoe} label="อำเภอ" />
        <DD val={filterType} opts={types} onChange={setFilterType} label="ประเภท" />
        <DD val={filterStatus} opts={statuses} onChange={setFilterStatus} label="สถานะ" />
        <DD val={sortBy} opts={["score","id","name"]} onChange={setSortBy} label="เรียงโดย" />
        <span style={{ fontSize:12, color:"#888" }}>พบ {filtered.length} รายการ</span>
      </div>

      {/* Grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:14 }}>
        {filtered.map(item=>{
          const score = getScore(item);
          const g = GRADE_SOLID(score);
          const img = item.image;
          return (
            <div key={item.id} style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 3px 14px rgba(0,0,0,0.08)", border:`1.5px solid ${g.border}20`, cursor:"pointer", transition:"transform 0.15s, box-shadow 0.15s", display:"flex", flexDirection:"column" }}
              onMouseEnter={e=>{ e.currentTarget.style.transform="translateY(-4px)"; e.currentTarget.style.boxShadow=`0 8px 24px ${g.border}40`; }}
              onMouseLeave={e=>{ e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow="0 3px 14px rgba(0,0,0,0.08)"; }}>
              {/* Image area */}
              <div onClick={()=>onSelect(item)} style={{ height:120, background:TYPE_BG[item.type]||"linear-gradient(135deg,#f1f8e9,#dcedc8)", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", position:"relative" }}>
                {img ? <img src={img} alt={item.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                  : <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:40, marginBottom:4 }}>{TYPE_EMOJI[item.type]||"🌿"}</div>
                      <div style={{ fontSize:10, color:"rgba(0,0,0,0.45)", fontWeight:600 }}>{item.type}</div>
                    </div>}
                <div style={{ position:"absolute", top:8, right:8 }}>
                  <label onClick={e=>e.stopPropagation()} htmlFor={`img-${item.id}`}
                    style={{ background:"rgba(255,255,255,0.92)", borderRadius:8, padding:"4px 8px", fontSize:10, cursor:"pointer", color:"#555", fontWeight:600 }}>📷</label>
                  <input id={`img-${item.id}`} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>handleImg(item.id,e)} />
                </div>
                <div style={{ position:"absolute", top:8, left:8, background:"rgba(0,0,0,0.35)", borderRadius:6, padding:"2px 7px", fontSize:10, color:"#fff", fontWeight:700 }}>#{item.id}</div>
              </div>
              {/* Content */}
              <div onClick={()=>onSelect(item)} style={{ padding:"12px 14px", flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"start", marginBottom:6 }}>
                  <div style={{ fontSize:11, color:"#888" }}>{item.amphoe}</div>
                  <span style={{ background:g.bg, color:g.color, borderRadius:20, padding:"2px 9px", fontSize:11, fontWeight:700, border:`1px solid ${g.border}` }}>{g.label}</span>
                </div>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", lineHeight:1.4, marginBottom:4 }}>{item.name}</div>
                <div style={{ fontSize:11, color:"#666", marginBottom:8 }}>{item.unit}</div>
                {/* Score bars mini */}
                <div style={{ display:"flex", gap:3, marginBottom:8 }}>
                  {[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=>(
                    <div key={i} style={{ flex:1, background:"#f5f5f5", borderRadius:3, height:5, overflow:"hidden" }}>
                      <div style={{ width:`${((v||0)/20)*100}%`, background:CRIT_COLORS[i], height:"100%" }} />
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:10, color:"#999", background:"#f5f5f5", borderRadius:8, padding:"2px 8px" }}>{item.status}</span>
                  <span style={{ fontSize:26, fontWeight:800, color:g.color }}>{score}</span>
                </div>
              </div>
              {/* Edit btn */}
              <div style={{ padding:"0 14px 12px" }}>
                <button onClick={e=>{ e.stopPropagation(); onEdit(item); }}
                  style={{ width:"100%", padding:"7px 0", background:g.bg, color:g.color, border:`1px solid ${g.border}`, borderRadius:10, fontSize:11, cursor:"pointer", fontWeight:700 }}>
                  ✏️ แก้ไขคะแนน
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── PAGE: RANKINGS ──────────────────────────────────────────────────────────
const getIndicationGroup = (item) => {
  const ind = item.indication || "";
  if (ind.includes("ปวด") || ind.includes("อักเสบ") || ind.includes("เมื่อย") || ind.includes("ตึง")) return "บรรเทาปวดและอักเสบ";
  if (ind.includes("หวัด") || ind.includes("วิงเวียน") || ind.includes("ไอ") || ind.includes("ระคายคอ") || ind.includes("คลื่นไส้") || ind.includes("คัดจมูก")) return "ทางเดินหายใจและวิงเวียน";
  if (ind.includes("ผิว") || ind.includes("ทำความสะอาด") || ind.includes("เซลล์ผิว")) return "เวชสำอางและบำรุงผิว";
  if (ind.includes("ถอนพิษ")) return "ถอนพิษสารเคมี";
  if (ind.includes("ชะลอวัย") || ind.includes("บำรุงหัวใจ")) return "ส่งเสริมสุขภาพชะลอวัย";
  return "อื่นๆ";
};

const Rankings = ({ items, onSelect }) => {
  const [sortCol, setSortCol] = useState("total");
  const [asc, setAsc] = useState(false);
  const [filterMode, setFilterMode] = useState("all");
  const [filterValue, setFilterValue] = useState("");

  const indications = [...new Set(items.map(getIndicationGroup))].sort();
  const amphoes = [...new Set(items.map(x=>x.amphoe))].sort();

  useEffect(() => {
    if (filterMode === "indication") setFilterValue(indications[0]);
    else if (filterMode === "amphoe") setFilterValue(amphoes[0]);
    else setFilterValue("");
  }, [filterMode]);

  const handleSort = (col) => { if(sortCol===col) setAsc(!asc); else { setSortCol(col); setAsc(false); }};

  const filteredItems = items.filter(x => {
    if (filterMode === "indication") return getIndicationGroup(x) === filterValue;
    if (filterMode === "amphoe") return x.amphoe === filterValue;
    return true;
  });

  const sortedForRank = [...filteredItems].sort((a,b)=>getScore(b) - getScore(a));

  const displayed = [...filteredItems].sort((a,b)=>{
    let va = sortCol==="total" ? getScore(a) : sortCol==="name" ? (a.name||"") : sortCol==="amphoe" ? (a.amphoe||"") : (a[sortCol] != null ? a[sortCol] : 0);
    let vb = sortCol==="total" ? getScore(b) : sortCol==="name" ? (b.name||"") : sortCol==="amphoe" ? (b.amphoe||"") : (b[sortCol] != null ? b[sortCol] : 0);
    if(typeof va==="string") return asc ? va.localeCompare(vb,"th") : vb.localeCompare(va,"th");
    return asc ? va-vb : vb-va;
  });

  const Th = ({col,label}) => (
    <th onClick={()=>handleSort(col)} style={{ padding:"10px 12px", background:"linear-gradient(135deg,#5c4500,#9a7a00)", color:"#fde68a", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", textAlign:"center", userSelect:"none" }}>
      {label} {sortCol===col ? (asc?"↑":"↓") : ""}
    </th>
  );

  return (
    <div>
      <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center", background:"#fff", padding:"14px 20px", borderRadius:16, boxShadow:"0 2px 12px rgba(184,150,12,0.12)", border:"1px solid #fffbf0", flexWrap:"wrap" }}>
        <div style={{ fontSize:14, fontWeight:800, color:GOLD.dark }}>📌 เลือกรูปแบบการจัดอันดับ:</div>
        <select value={filterMode} onChange={e=>setFilterMode(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #e8c840", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.dark, fontWeight:700 }}>
          <option value="all">🏆 คะแนนรวมทั้งหมด</option>
          <option value="indication">🏷️ จัดอันดับตามกลุ่มสรรพคุณ</option>
          <option value="amphoe">🗺️ จัดอันดับในอำเภอ</option>
        </select>
        {filterMode === "indication" && (
          <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #e8c840", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.main, background:"#fef9e7" }}>
            {indications.map(t=><option key={t} value={t}>สรรพคุณ: {t}</option>)}
          </select>
        )}
        {filterMode === "amphoe" && (
          <select value={filterValue} onChange={e=>setFilterValue(e.target.value)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #e8c840", outline:"none", cursor:"pointer", fontSize:13, color:GOLD.main, background:"#fef9e7" }}>
            {amphoes.map(a=><option key={a} value={a}>อ.{a}</option>)}
          </select>
        )}
        <div style={{ flex:1, textAlign:"right", fontSize:12, color:"#888" }}>
          จัดอันดับจาก <strong style={{color:GOLD.dark}}>{filteredItems.length}</strong> รายการ
        </div>
      </div>

      <div style={{ background:"#fff", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(184,150,12,0.12)", border:"1px solid #fffbf0" }}>
        <div style={{ padding:"16px 20px", borderBottom:"1px solid #fffbf0" }}>
          <div style={{ fontSize:15, fontWeight:700, color:"#9a7a00" }}>🏆 ตารางจัดอันดับผลงาน {filterMode==="all"?"ทั้งหมด":filterMode==="indication"?`กลุ่มสรรพคุณ: ${filterValue}`:`อำเภอ: ${filterValue}`}</div>
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr>
                <th style={{ padding:"10px 12px", background:"#9a7a00", color:"#fff", fontSize:12, fontWeight:600 }}>อันดับ</th>
                <Th col="name" label="ชื่อนวัตกรรม" />
                <Th col="unit" label="หน่วยงาน" />
                <Th col="amphoe" label="อำเภอ" />
                <th style={{ padding:"10px 12px", background:"#9a7a00", color:"#fff", fontSize:12 }}>หมวดหมู่</th>
                <Th col="c1" label="ค.1" />
                <Th col="c2" label="ค.2" />
                <Th col="c3" label="ค.3" />
                <Th col="c4" label="ค.4" />
                <Th col="c5" label="ค.5" />
                <Th col="total" label="รวม" />
                <th style={{ padding:"10px 12px", background:"linear-gradient(135deg,#5c4500,#9a7a00)", color:"#fff", fontSize:12 }}>ระดับ</th>
              </tr>
            </thead>
            <tbody>
              {displayed.map((item,idx)=>{
                const score = getScore(item);
                const rank = sortedForRank.findIndex(x=>x.id===item.id)+1;
                const g2 = GRADE_SOLID(score);
                const rowBg = idx%2===0?"#fff":"#fafafa";
                return (
                  <tr key={item.id} onClick={()=>onSelect(item)}
                    style={{ background:rowBg, cursor:"pointer" }}
                    onMouseEnter={e=>e.currentTarget.style.background=g2.bg}
                    onMouseLeave={e=>e.currentTarget.style.background=rowBg}>
                    <td style={{ padding:"9px 12px", textAlign:"center", fontWeight:700, color:rank<=5?["#e65100","#546e7a","#6d4c41","#5c4500","#7b5e00"][rank-1]:"#555", fontSize:13 }}>
                      {rank<=5?["🥇","🥈","🥉","4️⃣","5️⃣"][rank-1]:rank}
                    </td>
                    <td style={{ padding:"9px 12px", fontSize:12, fontWeight:600 }}>{item.name}</td>
                    <td style={{ padding:"9px 12px", fontSize:11, color:"#666" }}>{item.unit}</td>
                    <td style={{ padding:"9px 12px", fontSize:11, textAlign:"center" }}>{item.amphoe}</td>
                    <td style={{ padding:"9px 12px", textAlign:"center" }}>
                      <div style={{fontSize:11, fontWeight:700, color:"#444"}}>{item.type}</div>
                      <div style={{fontSize:9, color:"#999", marginTop:2}}>{getIndicationGroup(item)}</div>
                    </td>
                    {[item.c1,item.c2,item.c3,item.c4,item.c5].map((v,i)=>(
                      <td key={i} style={{ padding:"9px 8px", textAlign:"center", fontSize:12, fontWeight:700, color:CRIT_COLORS[i] }}>{v}</td>
                    ))}
                    <td style={{ padding:"9px 12px", textAlign:"center", fontSize:18, fontWeight:800, color:g2.color }}>{score}</td>
                    <td style={{ padding:"9px 12px", textAlign:"center" }}>
                      <span style={{ background:g2.bg, color:g2.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700, border:`1px solid ${g2.border}` }}>{g2.label}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ── PAGE: ANALYSIS (ADVANCED) ──────────────────────────────────────────────
const Analysis = ({ items }) => {
  const sorted = [...items].sort((a,b)=>getScore(b) - getScore(a));
  const avg = items.reduce((s,x)=>s+getScore(x),0)/items.length;
  const stdDev = Math.sqrt(items.reduce((s,x)=>s+Math.pow(getScore(x)-avg,2),0)/items.length);
  const passed = items.filter(x=>getScore(x)>=70);
  const failed = items.filter(x=>getScore(x)<70);

  const byAmphoe = Object.entries(
    items.reduce((acc,x)=>{ if(!acc[x.amphoe])acc[x.amphoe]={sum:0,n:0,items:[]}; acc[x.amphoe].sum+=getScore(x); acc[x.amphoe].n++; acc[x.amphoe].items.push(x); return acc; },{})
  ).map(([name,v])=>({ name, avg:+(v.sum/v.n).toFixed(1), n:v.n, items:v.items,
    max:Math.max(...v.items.map(x=>getScore(x))), min:Math.min(...v.items.map(x=>getScore(x))),
    passed:v.items.filter(x=>getScore(x)>=70).length,
    stdDev:+(Math.sqrt(v.items.reduce((s,x)=>s+Math.pow(getScore(x)-v.sum/v.n,2),0)/v.items.length)).toFixed(1),
  })).sort((a,b)=>b.avg-a.avg);

  const byType = Object.entries(items.reduce((acc,x)=>{ acc[x.type]=(acc[x.type]||[]); acc[x.type].push(getScore(x)); return acc; },{}))
    .map(([name,scores])=>({ name, count:scores.length, avg:+(scores.reduce((s,v)=>s+v,0)/scores.length).toFixed(1), max:Math.max(...scores) }))
    .sort((a,b)=>b.avg-a.avg);

  // IRL Distribution
  const byIRL = [1,2,3,4].map(lvl=>({
    lvl, label:["ไม่ระบุ","IRL1: แนวคิด","IRL2: R2R/เก็บข้อมูล","IRL3: วิจัยครบ","IRL4: จดแจ้ง อย."][lvl],
    items:items.filter(x=>(x.irl||2)===lvl), count:items.filter(x=>(x.irl||2)===lvl).length,
  }));

  // Research maturity
  const maturity = {
    done: items.filter(x=>(x.status||"").includes("เสร็จสิ้น")||(x.status||"").includes("วิจัยเต็ม")).length,
    r2r:  items.filter(x=>(x.status||"").toLowerCase().includes("r2r")).length,
    collecting: items.filter(x=>(x.status||"").includes("เก็บข้อมูล")||(x.status||"").includes("รวบรวม")).length,
    proposal: items.filter(x=>(x.status||"").includes("ข้อเสนอ")||(x.status||"").includes("กรอบ")).length,
    irl4: items.filter(x=>(x.irl||2)===4).length,
  };

  // Correlation: c1-c5 vs total
  const critCorr = ['c1','c2','c3','c4','c5'].map((k,i)=>{
    const pairs = items.map(x=>[(x[k]||0),getScore(x)]);
    const n=pairs.length, sx=pairs.reduce((s,p)=>s+p[0],0), sy=pairs.reduce((s,p)=>s+p[1],0);
    const sxy=pairs.reduce((s,p)=>s+p[0]*p[1],0), sx2=pairs.reduce((s,p)=>s+p[0]*p[0],0), sy2=pairs.reduce((s,p)=>s+p[1]*p[1],0);
    const r=(n*sxy-sx*sy)/Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));
    return { name:['ความเป็นนวัตกรรม','ความเหมาะสมบริบท','ความปลอดภัย','ประสิทธิผล','การนำไปใช้'][i], r:isNaN(r)?0:+r.toFixed(2), color:CRIT_COLORS[i] };
  });

  const Card = ({children, style={}}) => (
    <div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(184,150,12,0.08)", border:"1px solid #fde68a40", ...style }}>
      {children}
    </div>
  );
  const SectionTitle = ({icon,title,color=GOLD.dark}) => (
    <div style={{ fontSize:14, fontWeight:800, color, marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
      <span style={{ fontSize:18 }}>{icon}</span>{title}
    </div>
  );

  return (
    <div>
      {/* ── EXECUTIVE SUMMARY ── */}
      <div style={{ background:`linear-gradient(135deg,${GOLD.dark},${GOLD.main},${GOLD.medium})`, borderRadius:20, padding:24, marginBottom:16, color:"#fff" }}>
        <div style={{ fontSize:16, fontWeight:800, marginBottom:10 }}>📋 Executive Summary — WISDOM PRODUCT 2569</div>
        <div style={{ fontSize:13, lineHeight:1.9, opacity:0.92 }}>
          ผลการประเมินนวัตกรรมภูมิปัญญาแพทย์แผนไทย จ.สมุทรปราการ ปี 2569 จำนวน <strong>{items.length} ผลงาน</strong> จาก <strong>{[...new Set(items.map(x=>x.amphoe))].length} อำเภอ</strong> {[...new Set(items.map(x=>x.unit))].length} หน่วยบริการ
          พบคะแนนเฉลี่ย <strong>{avg.toFixed(1)}/100</strong> (S.D. = {stdDev.toFixed(1)}) ผ่านเกณฑ์ดี <strong>{passed.length} ผลงาน ({((passed.length/items.length)*100).toFixed(0)}%)</strong> มีผลงานระดับดีเด่น (≥85) จำนวน <strong>{items.filter(x=>getScore(x)>=85).length} ผลงาน</strong>
          และมีผลงานที่จดแจ้ง อย./ได้มาตรฐาน GMP แล้ว <strong>{maturity.irl4} ผลงาน</strong>
        </div>
        <div style={{ display:"flex", gap:12, marginTop:16, flexWrap:"wrap" }}>
          {[
            {l:"ค่าเฉลี่ย (x̄)", v:`${avg.toFixed(1)}`},
            {l:"SD", v:stdDev.toFixed(1)},
            {l:"ค่าสูงสุด", v:sorted.length > 0 ? getScore(sorted[0]) : "-"},
            {l:"ค่าต่ำสุด", v:sorted.length > 0 ? getScore(sorted[sorted.length-1]) : "-"},
            {l:"ผ่านเกณฑ์", v:`${passed.length}/${items.length}`},
            {l:"อยู่ระหว่างพัฒนา", v:maturity.collecting+maturity.r2r},
          ].map((s,i)=>(
            <div key={i} style={{ background:"rgba(255,255,255,0.15)", borderRadius:10, padding:"8px 14px", textAlign:"center" }}>
              <div style={{ fontSize:10, opacity:0.8 }}>{s.l}</div>
              <div style={{ fontSize:17, fontWeight:800 }}>{s.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── ROW 1: Score Distribution + Research Maturity ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        <Card>
          <SectionTitle icon="📊" title="การกระจายตัวของคะแนน (Histogram)" />
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={[
              {range:"85-100 (ดีเด่น)", count:items.filter(x=>getScore(x)>=85).length},
              {range:"75-84 (ดี)",       count:items.filter(x=>{const s=getScore(x);return s>=75&&s<85}).length},
              {range:"65-74 (พอใช้)",   count:items.filter(x=>{const s=getScore(x);return s>=65&&s<75}).length},
              {range:"<65 (ต้องพัฒนา)",count:items.filter(x=>getScore(x)<65).length},
            ]} margin={{left:0,right:8,top:0,bottom:20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#fde68a40" />
              <XAxis dataKey="range" tick={{fontSize:9}} angle={-15} textAnchor="end" />
              <YAxis allowDecimals={false} tick={{fontSize:10}} />
              <Tooltip formatter={v=>[v+" ผลงาน","จำนวน"]} />
              <Bar dataKey="count" radius={[6,6,0,0]}>
                <Cell fill={GOLD.dark} /><Cell fill={GOLD.main} /><Cell fill={GOLD.medium} /><Cell fill="#f87171" />
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ fontSize:11, color:"#888", marginTop:8, lineHeight:1.6 }}>
            ✦ ค่าเฉลี่ย {avg.toFixed(1)} S.D. {stdDev.toFixed(1)} · คะแนนส่วนใหญ่กระจายตัวในช่วง 65-84 · {failed.length} ผลงานต้องพัฒนาเพิ่มเติม
          </div>
        </Card>

        <Card>
          <SectionTitle icon="🔬" title="วุฒิภาวะงานวิจัย (Research Maturity)" />
          <ResponsiveContainer width="100%" height={180}>
            <PieChart>
              <Pie data={[
                {name:"วิจัยเสร็จสิ้น/จดแจ้ง", value:maturity.done+maturity.irl4},
                {name:"R2R (ดำเนินการ)", value:maturity.r2r},
                {name:"กำลังเก็บข้อมูล", value:maturity.collecting},
                {name:"จัดทำข้อเสนอ", value:maturity.proposal},
              ].filter(d=>d.value>0)} cx="50%" cy="50%" outerRadius={75} dataKey="value" paddingAngle={3} label={({name,value})=>`${value}`}>
                {[GOLD.dark,GOLD.main,GOLD.medium,"#f87171"].map((c,i)=><Cell key={i} fill={c} />)}
              </Pie>
              <Tooltip formatter={(v,n)=>[`${v} ผลงาน (${((v/items.length)*100).toFixed(0)}%)`,n]} />
              <Legend iconSize={10} wrapperStyle={{fontSize:10}} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ fontSize:11, color:"#888", marginTop:4, lineHeight:1.6 }}>
            ✦ {((( maturity.done+maturity.irl4)/items.length)*100).toFixed(0)}% ดำเนินการวิจัยเสร็จสิ้นแล้ว · {maturity.irl4} ผลงานได้มาตรฐาน IRL4 (จดแจ้ง อย./GMP)
          </div>
        </Card>
      </div>

      {/* ── ROW 2: Correlation + By Type ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        <Card>
          <SectionTitle icon="🔗" title="ความสัมพันธ์เกณฑ์กับคะแนนรวม (Correlation)" />
          <div style={{ marginBottom:8, fontSize:11, color:"#888" }}>ค่า r ยิ่งใกล้ 1 ยิ่งมีความสัมพันธ์สูง</div>
          {critCorr.map((c,i)=>(
            <div key={i} style={{ marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                <span style={{ fontSize:11, color:"#555" }}>{c.name}</span>
                <span style={{ fontSize:12, fontWeight:800, color:c.color }}>r = {c.r}</span>
              </div>
              <div style={{ background:"#f5f5f5", borderRadius:6, height:8, overflow:"hidden" }}>
                <div style={{ width:`${Math.abs(c.r)*100}%`, background:c.color, height:"100%", borderRadius:6 }} />
              </div>
            </div>
          ))}
          <div style={{ fontSize:11, color:"#888", marginTop:8 }}>
            ✦ เกณฑ์ที่มีความสัมพันธ์สูงสุดกับคะแนนรวมคือ <strong>{critCorr.length > 0 ? [...critCorr].sort((a,b)=>b.r-a.r)[0].name : ""}</strong> (r={critCorr.length > 0 ? [...critCorr].sort((a,b)=>b.r-a.r)[0].r : 0})
          </div>
        </Card>

        <Card>
          <SectionTitle icon="🏷️" title="คะแนนเฉลี่ยตามประเภทนวัตกรรม" />
          <div style={{ overflowY:"auto", maxHeight:240 }}>
            {byType.map((t,i)=>(
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, padding:"6px 10px", background:i%2===0?"#fffbf0":"#fef9e7", borderRadius:8 }}>
                <div style={{ fontSize:11, fontWeight:700, color:CHART_COLORS[i%CHART_COLORS.length], minWidth:16 }}>{i+1}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, fontWeight:600 }}>{t.name}</div>
                  <div style={{ fontSize:10, color:"#999" }}>{t.count} ผลงาน · สูงสุด {t.max}</div>
                </div>
                <div style={{ width:80 }}>
                  <div style={{ background:"#f5f5f5", borderRadius:4, height:6, overflow:"hidden" }}>
                    <div style={{ width:`${t.avg}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:4 }} />
                  </div>
                </div>
                <div style={{ fontSize:14, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length], minWidth:28, textAlign:"right" }}>{t.avg}</div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* ── ROW 3: Per-Amphoe Analysis ── */}
      <Card style={{ marginBottom:16 }}>
        <SectionTitle icon="🗺️" title="วิเคราะห์เชิงลึกรายอำเภอ (Amphoe Deep-Dive)" />
        <div style={{ display:"grid", gap:12 }}>
          {byAmphoe.map((a,i)=>{
            const topItem = [...a.items].sort((x,y)=>getScore(y)-getScore(x))[0];
            const passRate = ((a.passed/a.n)*100).toFixed(0);
            const cv = ((a.stdDev/a.avg)*100).toFixed(0); // Coefficient of Variation
            return (
              <div key={i} style={{ background:i%2===0?"#fffbf0":"#fef9e7", borderRadius:12, padding:"12px 16px", border:`1px solid ${CHART_COLORS[i%CHART_COLORS.length]}30` }}>
                <div style={{ display:"flex", alignItems:"start", gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:CHART_COLORS[i%CHART_COLORS.length], display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:800, fontSize:13, flexShrink:0 }}>{i+1}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                      <div style={{ fontSize:14, fontWeight:800, color:CHART_COLORS[i%CHART_COLORS.length] }}>อ.{a.name}</div>
                      <div style={{ display:"flex", gap:8 }}>
                        <span style={{ background:CHART_COLORS[i%CHART_COLORS.length], color:"#fff", borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>{a.n} ผลงาน</span>
                        <span style={{ background:a.passed===a.n?"#e8f5e9":"#fff8e1", color:a.passed===a.n?"#2e7d32":GOLD.amber, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>✓ {passRate}%</span>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:6 }}>
                      {[["ค่าเฉลี่ย",a.avg+"คะแนน"],["สูงสุด",a.max],["ต่ำสุด",a.min],["S.D.",a.stdDev],["CV",cv+"%"]].map(([l,v],j)=>(
                        <div key={j} style={{ fontSize:11, color:"#666" }}><span style={{ fontWeight:700, color:GOLD.dark }}>{v}</span> <span>{l}</span></div>
                      ))}
                    </div>
                    <div style={{ background:"#f5f5f5", borderRadius:6, height:8, overflow:"hidden", marginBottom:6 }}>
                      <div style={{ width:`${a.avg}%`, background:CHART_COLORS[i%CHART_COLORS.length], height:"100%", borderRadius:6 }} />
                    </div>
                    <div style={{ fontSize:11, color:"#777" }}>
                      🏆 ผลงานเด่น: <strong>{topItem ? topItem.name.substring(0,30) : ""}</strong> ({topItem ? getScore(topItem) : 0} คะแนน) ·
                      ประเภท: {[...new Set(a.items.map(x=>x.type))].join(", ")}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop:14, padding:"12px 14px", background:"#fffbf0", borderRadius:10, fontSize:12, color:GOLD.text, border:`1px solid ${GOLD.border}40` }}>
          <strong>✦ ข้อสังเกตเชิงวิเคราะห์รายอำเภอ:</strong><br/>
          • <strong>อ.{byAmphoe.length > 0 ? byAmphoe[0].name : ""}</strong> มีคะแนนเฉลี่ยสูงสุด ({byAmphoe.length > 0 ? byAmphoe[0].avg : 0}) แต่มีจำนวนผลงาน {byAmphoe.length > 0 ? byAmphoe[0].n : 0} ชิ้น ควรขยายจำนวนการส่งในปีถัดไป<br/>
          • อำเภอที่มีผลงานมากที่สุดคือ <strong>อ.{byAmphoe.length > 0 ? [...byAmphoe].sort((a,b)=>b.n-a.n)[0].name : ""} ({byAmphoe.length > 0 ? [...byAmphoe].sort((a,b)=>b.n-a.n)[0].n : 0} ผลงาน)</strong> แสดงถึงความตื่นตัวและศักยภาพสูง<br/>
          • CV (Coefficient of Variation) ต่ำแสดงถึงความสม่ำเสมอของคุณภาพในอำเภอนั้น · CV สูงแสดงถึงความแตกต่างระหว่างผลงาน
        </div>
      </Card>

      {/* ── ROW 4: IRL Analysis ── */}
      <Card style={{ marginBottom:16 }}>
        <SectionTitle icon="🚀" title="การวิเคราะห์ระดับ IRL (Innovation Readiness Level)" />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          {byIRL.filter(l=>l.count>0).map((l,i)=>(
            <div key={i} style={{ background:["#fffbf0","#fef9e7","#fef3c7","#fde68a"][l.lvl-1], borderRadius:12, padding:"14px 16px", border:`1px solid ${CHART_COLORS[l.lvl*2]}30` }}>
              <div style={{ fontSize:18, marginBottom:6 }}>{"🔴🟡🟢🏅"[l.lvl-1]}</div>
              <div style={{ fontSize:13, fontWeight:800, color:GOLD.dark, marginBottom:4 }}>{l.label}</div>
              <div style={{ fontSize:22, fontWeight:800, color:CHART_COLORS[l.lvl*2%CHART_COLORS.length] }}>{l.count} ผลงาน</div>
              <div style={{ fontSize:10, color:"#888", marginTop:4 }}>{l.items.map(x=>x.name.substring(0,15)).join(", ")}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize:12, color:"#666", lineHeight:1.8 }}>
          <strong>IRL1:</strong> กรอบแนวคิด/ข้อเสนอ · <strong>IRL2:</strong> R2R/เก็บข้อมูล · <strong>IRL3:</strong> วิจัยครบ/เสร็จสิ้น · <strong>IRL4:</strong> จดแจ้ง อย./GMP พร้อมผลิตเชิงพาณิชย์
        </div>
      </Card>

      {/* ── ROW 5: Key Insights Grid ── */}
      <Card style={{ marginBottom:16 }}>
        <SectionTitle icon="💡" title="การวิเคราะห์เชิงลึกและข้อสังเกต (Advanced Insights)" />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
          {[
            {icon:"🏆",title:"ผลงานระดับ Benchmark",body:`Top 5 ได้แก่ ${sorted.slice(0,5).map(x=>x.name ? x.name.substring(0,15) : "").join(", ")} ล้วนมีงานวิจัยครบวงจรและ/หรือได้มาตรฐาน GMP สามารถใช้เป็น Benchmark สำหรับหน่วยบริการอื่น`,bg:"#fffbf0",tc:GOLD.dark},
            {icon:"📈",title:"แนวโน้มสมุนไพรหลัก",body:`ไพลปรากฏในนวัตกรรม ${items.filter(x=>(x.ingredients||[]).join("").includes("ไพล")).length} ผลงาน ขมิ้นชัน ${items.filter(x=>(x.ingredients||[]).join("").includes("ขมิ้น")).length} ผลงาน ว่านหางจระเข้ ${items.filter(x=>(x.ingredients||[]).join("").includes("ว่านหาง")).length} ผลงาน แสดงถึงความนิยมสมุนไพรที่มีหลักฐานรองรับ`,bg:"#fef9e7",tc:GOLD.main},
            {icon:"🎯",title:"Gap Analysis: คะแนนต่ำ",body:`${failed.length} ผลงาน (คะแนน <70) ที่ต้องพัฒนาคือ ${failed.map(x=>x.name ? x.name.substring(0,12) : "").join(", ")} — ส่วนใหญ่ขาดข้อมูลประสิทธิผลเชิงปริมาณ ไม่มีการทดสอบ Stability และ Skin Test`,bg:"#fff7ed",tc:GOLD.amber},
            {icon:"🔄",title:"Portfolio Balance",body:`สัดส่วน External-use Products (สเปรย์/แผ่นแปะ/ยาพอก/ลูกประคบ) ${items.filter(x=>["สเปรย์","แผ่นแปะ","ยาพอก","ลูกประคบ","สเปรย์พ่นคอ","แผ่นแปะสมุนไพร","เกลือแช่เท้า","ถุงประคบ","สไลม์","เจล"].includes(x.type)).length}/${items.length} ผลงาน สะท้อนแนวทาง Pain Management เป็นหลัก`,bg:"#fef3c7",tc:GOLD.medium},
            {icon:"⚗️",title:"มาตรฐานการทดสอบ",body:`เพียง ${items.filter(x=>(x.irl||2)>=3).length} ผลงาน (${((items.filter(x=>(x.irl||2)>=3).length/items.length)*100).toFixed(0)}%) มีผลการทดสอบระดับ IRL3+ ที่เหลือยังขาด Stability Test, Patch Test, Microbial Challenge ซึ่งจำเป็นสำหรับการจดแจ้ง อย.`,bg:"#fffde7",tc:"#92400e"},
            {icon:"💰",title:"ศักยภาพเชิงพาณิชย์",body:`${items.filter(x=>(x.irl||2)>=4).length} ผลงาน พร้อมเชิงพาณิชย์ (IRL4) · ผลงานที่มีศักยภาพ OTOP สูงสุดคือ สครับอาบน้ำ, ชาบัวหลวง, สเปรย์เวนแคร์ เนื่องจากมีความต้องการตลาด Wellness ที่ชัดเจน`,bg:"#fffbf0",tc:GOLD.dark},

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useState(() => {
    const saved = loadData();
    if (saved) {
      return INITIAL_ITEMS.map(orig => {
        const found = saved.find(s => s.id === orig.id);
        return found ? { ...orig, userScore: found.userScore, comments: found.comments || [], image: found.image || null } : orig;
      });
    }
    return INITIAL_ITEMS;
  });
  const [page, setPage] = useState("dashboard");
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(null);
  const [showImport, setShowImport] = useState(false);

  useEffect(() => {
    saveData(items.map(x => ({ id: x.id, userScore: x.userScore, comments: x.comments, image: x.image })));
  }, [items]);

  const handleSave = (id, score, comment) => {
    setItems(prev => prev.map(x => x.id !== id ? x : {
      ...x,
      userScore: score,
      comments: comment.trim() ? [...(x.comments||[]), { text: comment.trim(), date: new Date().toLocaleDateString("th-TH") }] : (x.comments||[]),
    }));
    if (selected && selected.id === id) {
      setSelected(prev => ({ 
        ...prev, 
        userScore: score, 
        comments: comment.trim() ? [...(prev.comments||[]), { text: comment.trim(), date: new Date().toLocaleDateString("th-TH") }] : (prev.comments||[]) 
      }));
    }
    setEditing(null);
  };

  const handleImport = (data) => {
    const newItems = [...items];
    data.forEach(d => {
      const idx = newItems.findIndex(x => x.id === d.id);
      if (idx >= 0) { newItems[idx] = { ...newItems[idx], ...d }; }
      else { newItems.push({ ...INITIAL_ITEMS[0], ...d, comments: d.comments || [], image: d.image || null }); }
    });
    setItems(newItems);
  };

  const handleImageUpdate = (id, imageData) => {
    setItems(prev => prev.map(x => x.id === id ? { ...x, image: imageData } : x));
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(items, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `wisdom_2569_${new Date().toISOString().slice(0,10)}.json`;
    a.style.display = "none";
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);

      <div style={{ background:"linear-gradient(135deg,#5c4500 0%,#9a7a00 40%,#c49b0a 100%)", padding:"12px 20px", position:"sticky", top:0, zIndex:900, boxShadow:"0 3px 20px rgba(92,69,0,0.35)" }}>
        <div style={{ maxWidth:1100, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ fontSize:28 }}>🌿</div>
              <div>
                <div style={{ color:"#fff", fontWeight:800, fontSize:16, lineHeight:1 }}>WISDOM PRODUCT 2569</div>
                <div style={{ color:"#fde68a", fontSize:11 }}>นวัตกรรมภูมิปัญญาแพทย์แผนไทย · สมุทรปราการ</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={handlePrint}
                style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>
                🖨️ PDF
              </button>
              <button onClick={handleSaveHTML}
                style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>
                💾 HTML+รูป
              </button>
              <button onClick={handleOpenHTML}
                style={{ background:"rgba(255,215,0,0.35)", color:"#fff", border:"1px solid rgba(255,215,0,0.6)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:700 }}>
                🌐 เปิด HTML
              </button>
              <button onClick={() => setShowImport(true)}
                style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>
                📥 นำเข้า
              </button>
              <button onClick={handleExport}
                style={{ background:"rgba(255,255,255,0.18)", color:"#fff", border:"1px solid rgba(255,255,255,0.35)", borderRadius:10, padding:"7px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>
                📤 JSON
              </button>
            </div>
          </div>
          {/* Nav */}
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {PAGES.map(p => (
              <button key={p.id} onClick={() => setPage(p.id)}
                style={{ padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, transition:"all 0.15s",
                  background: page === p.id ? "#fff" : "rgba(255,255,255,0.12)",
                  color: page === p.id ? PAGE_COLORS[p.id] : "#fde68a",
                  boxShadow: page === p.id ? `0 2px 8px rgba(255,215,0,0.4)` : "none" }}>
                {p.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth:1100, margin:"0 auto", padding:16 }}>
        {page === "dashboard" && <Dashboard items={items} onSelect={setSelected} />}
        {page === "products" && <ProductList items={items} onSelect={setSelected} onEdit={setEditing} onImageUpdate={handleImageUpdate} />}
        {page === "rankings" && <Rankings items={items} onSelect={setSelected} />}
        {page === "analysis" && <Analysis items={items} />}
        {page === "about" && <About items={items} onExport={handleExport} onPrint={handlePrint} onSaveHTML={handleSaveHTML} />}
      </div>

      {/* Footer */}
      <div style={{ textAlign:"center", padding:"20px 16px", color:"#888", fontSize:11, borderTop:"1px solid #e0e0e0", marginTop:8 }}>
        <div>🌿 <span style={{ color:"#9a7a00", fontWeight:700 }}>WISDOM PRODUCT 2569</span> · <span style={{ color:"#1565c0" }}>ภก.จีรภัทร พลายงาม</span> · <span style={{ color:"#8e24aa" }}>สสจ.สมุทรปราการ</span></div>
        <div style={{ marginTop:2 }}>อัปเดต: {new Date().toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric"})}</div>
      </div>

      {/* Modals */}
      {selected && !editing && (
        <ProductModal item={selected} onClose={() => setSelected(null)} onEdit={setEditing} />
      )}
      {editing && (
        <EditModal item={editing} onClose={() => setEditing(null)} onSave={handleSave} />
      )}
      {showImport && (
        <ImportModal onClose={() => setShowImport(false)} onImport={handleImport} />
      )}
    </div>
  );
}

    // ── RENDER ────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    // ครอบด้วย ErrorBoundary
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
