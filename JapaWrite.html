    const getThaiTip = (charData) => {

    const getDeepLesson = (charData) => {

    const DrawingPad = ({ guideText, size, clearTrigger, onDraw, onStats, inkColor, tool, isDarkMode }) => {
      const canvasRef = useRef(null);
      const contextRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const strokeCountRef = useRef(0);
      const startAtRef = useRef(0);
      useEffect(() => {
        const canvas = canvasRef.current;
        canvas.width = size * 2; canvas.height = size * 2; canvas.style.width = `${size}px`; canvas.style.height = `${size}px`;
        const context = canvas.getContext('2d'); context.scale(2,2); contextRef.current = context;
      }, [size]);
      useEffect(() => {
        const context = contextRef.current; if (!context) return;
        context.lineCap = 'round'; context.lineJoin = 'round';
        context.strokeStyle = (isDarkMode && inkColor === '#2F2A36') ? '#FFFFFF' : inkColor;
        if (tool === 'brush') { context.lineWidth = size > 150 ? 19 : 12; context.shadowBlur = 4; context.shadowColor = context.strokeStyle; context.globalAlpha = .86; }
        else { context.lineWidth = size > 150 ? 12 : 8; context.shadowBlur = 0; context.globalAlpha = 1; }
      }, [inkColor, tool, size, isDarkMode]);
      useEffect(() => {
        if (clearTrigger > 0 && canvasRef.current) {
          const canvas = canvasRef.current; const context = canvas.getContext('2d');
          context.save(); context.globalAlpha = 1; context.clearRect(0,0,canvas.width,canvas.height); context.restore(); strokeCountRef.current = 0;
          onStats && onStats({strokes:0, coverage:0, durationMs:0});
        }
      }, [clearTrigger]);
      const getCoordinates = (e) => {
        if (e.touches && e.touches.length > 0) { const touch = e.touches[0]; const rect = canvasRef.current.getBoundingClientRect(); return { offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top }; }
        return { offsetX: e.nativeEvent.offsetX, offsetY: e.nativeEvent.offsetY };
      };
      const calcCoverage = () => {
        try {
          const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
          let ink = 0; for (let i=3; i<data.length; i+=4) if (data[i] > 8) ink++;
          return Math.round((ink / (canvas.width*canvas.height)) * 1000) / 10;
        } catch { return 0; }
      };
      const startDrawing = (e) => { e.preventDefault && e.preventDefault(); const {offsetX, offsetY} = getCoordinates(e); const ctx = contextRef.current; ctx.beginPath(); ctx.moveTo(offsetX, offsetY); setIsDrawing(true); strokeCountRef.current += 1; startAtRef.current = Date.now(); onDraw && onDraw(); };
      const finishDrawing = () => { if (!isDrawing) return; contextRef.current.closePath(); setIsDrawing(false); onStats && onStats({strokes: strokeCountRef.current, coverage: calcCoverage(), durationMs: Date.now() - startAtRef.current}); };
      const draw = (e) => { if (!isDrawing) return; e.preventDefault && e.preventDefault(); const {offsetX, offsetY} = getCoordinates(e); contextRef.current.lineTo(offsetX, offsetY); contextRef.current.stroke(); };
      return (
        <div className={`relative rounded-2xl shadow-sm border-2 overflow-hidden shrink-0 flex items-center justify-center transition-all duration-300 hover:shadow-md ${isDarkMode ? 'bg-[#211a23] border-pink-700/45' : 'bg-[#fff7fb] border-pink-200'}`} style={{width:size, height:size}}>
          <div className="absolute inset-0 pointer-events-none opacity-40">
            <div className={`w-full h-full border-b border-dashed absolute top-1/2 ${isDarkMode ? 'border-pink-600' : 'border-rose-300'}`}></div>
            <div className={`w-full h-full border-r border-dashed absolute left-1/2 ${isDarkMode ? 'border-pink-600' : 'border-rose-300'}`}></div>
            <div className={`w-full h-full border border-dotted absolute inset-4 rounded-xl ${isDarkMode ? 'border-teal-800' : 'border-teal-100'}`}></div>
          </div>
          {guideText && <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none"><span className={`${isDarkMode ? 'text-pink-950/80' : 'text-pink-100'} font-black`} style={{fontFamily:'Hiragino Mincho ProN, Yu Mincho, serif', fontSize: guideText.length > 2 ? size*.27 : guideText.length > 1 ? size*.40 : size*.70}}>{guideText}</span></div>}
          <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseUp={finishDrawing} onMouseMove={draw} onMouseOut={finishDrawing} onTouchStart={startDrawing} onTouchEnd={finishDrawing} onTouchMove={draw} className="absolute inset-0 z-10 cursor-crosshair touch-none" />
        </div>
      );
    };

    const MoraGraph = ({sample='がっこう'}) => {
      const mora = sample.replace(/[ゃゅょャュョぁぃぅぇぉァィゥェォ]/g,'').length;

    function JapanWritingApp() {
      const [currentView, setCurrentView] = useState('menu');
      const [selectedMode, setSelectedMode] = useState('learn');
      const [activeTab, setActiveTab] = useState('hiragana');
      const [currentLessonItem, setCurrentLessonItem] = useState(LESSONS[0]);
      const [currentCharIndex, setCurrentCharIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [hasDrawn, setHasDrawn] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [clearTrigger, setClearTrigger] = useState(0);
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [isLeftHanded, setIsLeftHanded] = useState(false);
      const [inkColor, setInkColor] = useState('#BE185D');
      const [tool, setTool] = useState('pen');
      const [showStrokeGuide, setShowStrokeGuide] = useState(true);
      const COLORS = ['#BE185D','#E11D48','#0F766E','#2F2A36','#D97706'];
      const [gameScore, setGameScore] = useState(0);

      const [moraQuestion, setMoraQuestion] = useState(null);

      const [exerciseQuestion, setExerciseQuestion] = useState(null);
      const [exerciseStats, setExerciseStats] = useState({correct:0,total:0});
      const [drawStats, setDrawStats] = useState({strokes:0, coverage:0, durationMs:0});
      const [progress, setProgress] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {completed:{}, attempts:{}, scores:[], srs:{}, streak:{date:null,count:0}}; }
        catch { return {completed:{}, attempts:{}, scores:[], srs:{}, streak:{date:null,count:0}}; }
      });
      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }, [progress]);
      const filteredLessons = LESSONS.filter(l => l.type === activeTab);
      const dueItems = useMemo(() => Object.entries(progress.srs || {}).filter(([k,v]) => (v.nextDue || 0) <= Date.now()).map(([k]) => k), [progress]);
      const avgScore = progress.scores?.length ? Math.round(progress.scores.reduce((a,b)=>a+b,0)/progress.scores.length) : 0;

      const markProgress = (charData, finalScore=80, quality='ok') => {
        const key = `${charData.kind}:${charData.kana}:${charData.romaji}`;
        setProgress(prev => {
          const old = prev.srs?.[key] || {level:0, ease:'new'};
          const delta = quality === 'easy' ? 2 : quality === 'hard' ? 0 : quality === 'forgot' ? -1 : 1;
          const level = Math.max(0, Math.min(8, old.level + delta));
          const days = quality === 'forgot' ? .25 : [0.5,1,2,4,7,14,30,60,120][level] || 7;
          const streakDate = prev.streak?.date === todayISO() ? prev.streak : {date: todayISO(), count: (prev.streak?.date ? prev.streak.count + 1 : 1)};
          return {
            completed: {...prev.completed, [key]: true},
            attempts: {...prev.attempts, [key]: (prev.attempts?.[key] || 0) + 1},
            scores: [...(prev.scores || []), finalScore].slice(-200),
            srs: {...(prev.srs || {}), [key]: {level, ease: quality, nextDue:addDays(days), last:Date.now(), text:charData.kana, reading:charData.romaji}},
            streak: streakDate
          };
        });
      };

      const startLesson = (lesson) => { setCurrentLessonItem(lesson); setCurrentCharIndex(0); setScore(0); setCurrentView('lessonIntro'); setFeedback(null); setHasDrawn(false); setDrawStats({strokes:0, coverage:0, durationMs:0}); };
      const beginSelectedLesson = () => { setCurrentView(selectedMode); setFeedback(null); setHasDrawn(false); setClearTrigger(prev => prev + 1); };
      const calcWritingScore = (charData) => {
        const expected = charData.expectedStrokes || 3;

        const coverageIdeal = charData.kind === 'kanji' ? 7.2 : charData.kana.length > 1 ? 5.2 : 3.8;

        const practiceBonus = hasDrawn ? 20 : 0;

      const buildExerciseQuestion = (type = exerciseType) => {

        else if (type === 'scriptMatch') { const hira = ALL_CHARS.find(c=>c.kind==='hiragana' && c.kana.length===1); const hPool = ALL_CHARS.filter(c=>c.kind==='hiragana' && c.kana.length===1); const h = hPool[Math.floor(Math.random()*hPool.length)] || hira; questionText='ฮิรางานะนี้ตรงกับคาตาคานะใด'; prompt=h.kana; answer=toKatakana(h.kana); choices=shuffle(uniqueBy([answer, ...shuffle(hPool).map(c=>toKatakana(c.kana))], x=>x)).slice(0,4); }

                <div className="grid grid-cols-2 gap-4 w-full">{Array.from({length:8}).map((_,i)=><DrawingPad key={`drill-${i}`} guideText={null} size={116} clearTrigger={clearTrigger} onDraw={()=>setHasDrawn(true)} onStats={(s)=>{ if(i===0) setDrawStats(s); }} inkColor={inkColor} tool={tool} isDarkMode={isDarkMode}/>)}</div>
              </div>
              <div className={`w-full max-w-[265px] grid grid-cols-3 gap-2 mb-3 text-xs ${isDarkMode?'text-pink-50':'text-rose-950'}`}><button onClick={()=>{markProgress(charData, Math.max(assessedScore,85), 'easy'); setFeedback({type:'success', text:'บันทึกว่า จำง่าย แล้วค่ะ'});}} className="py-2 rounded-xl bg-teal-600 text-white font-bold">จำง่าย</button><button onClick={()=>{markProgress(charData, assessedScore, 'hard'); setFeedback({type:'success', text:'บันทึกให้ทบทวนเร็วขึ้นค่ะ'});}} className="py-2 rounded-xl bg-amber-500 text-white font-bold">ยังยาก</button><button onClick={()=>{markProgress(charData, 45, 'forgot'); setFeedback({type:'error', text:'บันทึกว่า ลืมแล้ว จะกลับมาให้ทบทวนค่ะ'});}} className="py-2 rounded-xl bg-rose-700 text-white font-bold">ลืมแล้ว</button></div>
              <div className={`flex mt-2 pb-8 space-x-4 w-full max-w-[265px] ${isLeftHanded?'flex-row-reverse space-x-reverse':''}`}><button onClick={clearCanvas} className={`flex-1 flex items-center justify-center space-x-2 py-3.5 rounded-2xl font-bold shadow-sm border transition-all active:scale-95 ${isDarkMode?'bg-[#2a1f2e]/80 border-pink-700/40 text-pink-50 hover:bg-[#34283a]':'bg-white border-pink-200 text-rose-950 hover:bg-pink-50'}`}><i className="fas fa-rotate-left"></i><span>ล้าง</span></button>{isPractice?<button onClick={checkAnswer} className="flex-[2] flex items-center justify-center space-x-2 py-3.5 bg-rose-500 text-white rounded-2xl font-bold shadow-[0_4px_0_#be185d] active:translate-y-1"><i className="fas fa-circle-check text-pink-100"></i><span>ตรวจคะแนน</span></button>:<button onClick={handleNext} className={`flex-[2] flex items-center justify-center space-x-2 py-3.5 text-white rounded-2xl font-bold shadow-[0_4px_0_#0f766e] active:translate-y-1 bg-teal-600`}><span>ถัดไป</span><i className="fas fa-play text-teal-100"></i></button>}</div>
              {isPractice && feedback && <button onClick={handleNext} className="mb-8 px-8 py-3 bg-teal-600 text-white rounded-2xl font-bold shadow-md">บันทึกคะแนนและไปต่อ</button>}
            </div>
          </div>
        );
      };

      const renderMiniGame = () => gameCurrentQuestion && (
        <div className={`flex flex-col h-full p-6 animate-in slide-in-from-bottom duration-300 relative z-10 ${isDarkMode?'text-pink-50':'text-rose-950'}`}>
          <div className="flex justify-between items-center mb-8"><HeaderButton onClick={()=>setCurrentView('menu')} icon="fa-chevron-left"/><div className="text-center font-bold"><span className="text-pink-500 text-xl">Score: {gameScore}</span></div><div className="text-sm font-bold opacity-60">{gameQuestionCount}/10</div></div>
          <div className="flex-1 flex flex-col items-center justify-center">{feedback && <div className={`absolute top-20 px-6 py-3 rounded-xl font-bold text-white z-20 animate-bounce shadow-lg ${feedback.type==='success'?'bg-teal-600':'bg-rose-600'}`}>{feedback.text}</div>}<p className="text-xl font-bold mb-4 opacity-75">ตัวใดอ่านว่า</p><div className={`w-44 h-44 rounded-3xl flex flex-col items-center justify-center mb-10 shadow-lg border-4 ${isDarkMode?'bg-[#2a1f2e]/80 border-pink-700 text-pink-50':'bg-white border-pink-200 text-rose-700'}`}><span className="text-4xl font-black text-center">{gameCurrentQuestion.target.romaji}</span><span className="text-xs mt-3 opacity-50">romaji / 読み方</span></div><div className="grid grid-cols-2 gap-4 w-full max-w-[300px]">{gameCurrentQuestion.choices.map((choice,i)=><button key={i} onClick={()=>handleGameAnswer(choice)} className={`py-8 rounded-2xl text-5xl font-black shadow-[0_6px_0_rgba(0,0,0,.1)] transition-all hover:translate-y-1 ${isDarkMode?'bg-[#2a1f2e]/80 text-pink-50 border border-pink-700/40':'bg-white text-rose-700'}`} style={{fontFamily:'Hiragino Mincho ProN, Yu Mincho, serif'}}>{choice.kana}</button>)}</div></div>
        </div>
      );

      const renderMoraLab = () => (
        <div className={`flex flex-col h-full p-6 animate-in slide-in-from-bottom duration-300 relative z-10 ${isDarkMode?'text-pink-50':'text-rose-950'}`}>
          <div className="flex items-center mb-6"><HeaderButton onClick={()=>setCurrentView('menu')} icon="fa-chevron-left"/><h2 className="text-2xl font-black ml-4">Mora Lab เสียงญี่ปุ่น</h2></div>
          <div className={`p-5 rounded-3xl mb-4 text-center ${isDarkMode?'bg-[#2a1f2e]/75 border border-pink-700/30':'bg-white/90'}`}><p className="font-bold opacity-70 mb-3">ฟังเสียง แล้วจับจังหวะ mora / เสียงยาว / เสียงกัก</p><div className="text-6xl font-black mb-2" style={{fontFamily:'Hiragino Mincho ProN, Yu Mincho, serif'}}>{moraQuestion?.sample || 'がっこう'}</div><div className="text-pink-600"><MoraGraph sample={moraQuestion?.sample || 'がっこう'}/></div><p className="mt-3 text-sm font-bold text-teal-600">{moraQuestion?.feature || 'เสียงกัก っ + เสียงยาว'}</p><button onClick={()=>playAudio(moraQuestion?.sample || 'がっこう')} className="mt-4 px-5 py-3 rounded-2xl bg-rose-500 text-white font-bold"><i className="fas fa-volume-high mr-2"></i>ฟังอีกครั้ง</button></div>
          <div className="grid grid-cols-2 gap-2 mb-5">{['3 mora','4 mora','มีเสียงกัก っ','มีเสียงยาว'].map(t=><button key={t} onClick={()=>{ const ok = moraQuestion && (t===moraQuestion.answer || (t==='มีเสียงกัก っ' && moraQuestion.sample.includes('っ')) || (t==='มีเสียงยาว' && /ー|う|い/.test(moraQuestion.sample))); setFeedback({type:ok?'success':'error', text:ok?'แม่นมากค่ะ 🎯':'ยังไม่ใช่ ลองฟังใหม่ค่ะ'}); if(ok) setTimeout(nextMoraQuestion,800); }} className="py-3 rounded-2xl bg-teal-600 text-white font-bold text-sm">{t}</button>)}</div>
          {feedback && <div className={`p-4 rounded-2xl text-white font-bold text-center ${feedback.type==='success'?'bg-teal-600':'bg-rose-700'}`}>{feedback.text}</div>}
          <button onClick={nextMoraQuestion} className="mt-5 py-4 rounded-2xl bg-pink-500 text-white font-bold shadow-md"><i className="fas fa-random mr-2"></i>สุ่มเสียงใหม่</button>
          <div className={`mt-5 p-4 rounded-2xl text-sm ${isDarkMode?'bg-[#2a1f2e]/65':'bg-pink-50'}`}><b>เคล็ดลับคนไทย:</b> ญี่ปุ่นไม่มีวรรณยุกต์แบบจีน แต่มีจังหวะ mora และ pitch accent สำคัญมากค่ะ เสียงยาวกับเสียงกักทำให้ความหมายเปลี่ยนได้ เช่น おばさん / おばあさん</div>
        </div>
      );

      const renderDashboard = () => {
        const total = ALL_CHARS.length; const done = Object.keys(progress.completed||{}).length; const percent = Math.round((done/total)*100);
        const topDue = Object.values(progress.srs || {}).filter(v => (v.nextDue || 0) <= Date.now()).slice(0,8);
        return <div className={`flex flex-col h-full p-6 animate-in slide-in-from-bottom duration-300 relative z-10 overflow-y-auto custom-scrollbar ${isDarkMode?'text-pink-50':'text-rose-950'}`}><div className="flex items-center mb-5"><HeaderButton onClick={()=>setCurrentView('menu')} icon="fa-chevron-left"/><h2 className="text-2xl font-black ml-4">Dashboard ความก้าวหน้า</h2></div><div className="grid grid-cols-2 gap-3 mb-4"><div className={`p-5 rounded-3xl ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/90'}`}><p className="text-xs opacity-60 font-bold">เรียนแล้ว</p><p className="text-4xl font-black">{done}</p><p className="text-xs opacity-60">จาก {total} รายการ</p></div><div className={`p-5 rounded-3xl ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/90'}`}><p className="text-xs opacity-60 font-bold">คะแนนเฉลี่ย</p><p className="text-4xl font-black">{avgScore}</p><p className="text-xs opacity-60">จาก {progress.scores?.length || 0} ครั้ง</p></div></div><div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/90'}`}><div className="flex justify-between text-sm font-bold mb-2"><span>Progress</span><span>{percent}%</span></div><div className="w-full h-4 bg-pink-100 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-pink-500 to-teal-500" style={{width:`${percent}%`}}></div></div><p className="mt-3 text-sm opacity-70">Streak: {progress.streak?.count || 0} วัน · ควรทบทวนวันนี้ {dueItems.length} รายการ</p></div><div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/90'}`}><h3 className="font-black mb-3"><i className="fas fa-clock-rotate-left mr-2 text-pink-500"></i>คิวทบทวนแบบ Spaced Repetition</h3>{topDue.length ? <div className="grid grid-cols-4 gap-2">{topDue.map((v,i)=><div key={i} className="p-3 rounded-2xl bg-pink-100/90 text-rose-950 text-center"><div className="text-2xl font-black">{v.text}</div><div className="text-xs">{v.reading}</div></div>)}</div> : <p className="text-sm opacity-65">ยังไม่มีคิวค้าง วันนี้สมองโล่งเหมือนสวนเซนหลังฝนตกค่ะ 😄</p>}</div><div className={`p-5 rounded-3xl ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/90'}`}><h3 className="font-black mb-2">Badge</h3><div className="grid grid-cols-2 gap-2 text-sm">{[['はじめて','ผู้เริ่มต้น',done>=1],['かな名人','เซียนคานะ',done>=46],['カタカナPro','คาตาคานะโปร',done>=90],['漢字小先生','ครูน้อยคันจิ',done>=140]].map((b,i)=><div key={i} className={`p-3 rounded-2xl border ${b[2]?'bg-pink-100 border-pink-300 text-rose-950':'opacity-40 border-gray-300'}`}><b>{b[0]}</b><p>{b[1]}</p></div>)}</div></div></div>;
      };

      const renderSummary = () => {
        const isGameSummary = currentView === 'gameSummary';
        const stars = selectedMode === 'practice' || isGameSummary ? calculateStars() : 0;
        const learned = currentLessonItem.chars || [];
        const reviewText = learned.slice(0,8).map(c => `${c.kana} ${c.romaji}`).join(' · ');
        return <div className={`flex flex-col h-full p-6 overflow-y-auto custom-scrollbar animate-in zoom-in duration-500 relative z-10 ${isDarkMode?'text-pink-50':'text-rose-950'}`}>
          <div className="text-center mb-5">{selectedMode==='practice'||isGameSummary?<div className="flex justify-center space-x-2 mb-5">{[1,2,3].map(star=><i key={star} className={`fas fa-star text-5xl ${star<=stars?'text-pink-400 drop-shadow-lg':'text-gray-300'}`}></i>)}</div>:<i className="fas fa-award text-6xl text-pink-400 mb-4 drop-shadow-md"></i>}<h2 className={`text-3xl font-black ${isDarkMode?'kawaii-sheen':'text-rose-700'}`}>{isGameSummary?'จบเกมแล้วค่ะ!':'สรุปบทเรียน'}</h2><p className="opacity-70 text-sm mt-2">{isGameSummary?'ทบทวนคานะ/คันจิต่ออีกนิด เก่งขึ้นแน่นอนค่ะ':currentLessonItem.title}</p></div>
          <div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-[#2a1f2e]/75 border border-pink-700/35':'bg-white/95 border border-pink-200'}`}><h3 className="font-black mb-2"><i className="fas fa-clipboard-check mr-2 text-pink-500"></i>Lesson Summary</h3><p className="text-sm opacity-75">วันนี้เรียน/ฝึก: {reviewText || '—'}</p><p className="text-sm opacity-75 mt-1">จำนวนรายการในบทนี้: <b>{learned.length}</b> · คะแนนสะสม: <b>{isGameSummary?gameScore:score}</b></p><div className="grid grid-cols-3 gap-2 mt-3 text-center text-xs"><div className="p-2 rounded-xl bg-pink-100 text-rose-950"><b>เสียง</b><p>mora/โรมาจิ</p></div><div className="p-2 rounded-xl bg-pink-100 text-rose-950"><b>เขียน</b><p>ขีด/สัดส่วน</p></div><div className="p-2 rounded-xl bg-pink-100 text-rose-950"><b>ใช้จริง</b><p>คำ/ประโยค</p></div></div></div>
          <div className={`p-5 rounded-3xl mb-4 ${isDarkMode?'bg-[#2a1f2e]/75':'bg-white/95'}`}><h3 className="font-black mb-2">คำแนะนำรอบถัดไป</h3><ul className="list-disc pl-5 text-sm space-y-1 opacity-80"><li>ตัวที่ยังไม่มั่นใจให้กด “ยังยาก” เพื่อเข้า Spaced Repetition</li><li>ฝึกฮิรางานะก่อน แล้วค่อยคาตาคานะและคันจิ</li><li>ใช้ Mora Lab วันละ 3 นาที เพื่อแยกเสียงยาว ー และเสียงกัก っ</li></ul></div>
          <div className="grid grid-cols-2 gap-3"><button onClick={()=>setCurrentView(isGameSummary?'menu':'lessonSelect')} className="px-6 py-4 text-white rounded-2xl font-bold shadow-[0_4px_0_#be185d] bg-rose-500">กลับบทเรียน</button><button onClick={()=>setCurrentView('dashboard')} className="px-6 py-4 text-white rounded-2xl font-bold shadow-[0_4px_0_#0f766e] bg-teal-600">ดู Dashboard</button></div>
        </div>;
      };

      return (
        <div className={`w-full h-full relative font-sans flex flex-col transition-colors duration-500 ${isDarkMode?'bg-[#17131c]':'bg-[#fff7fb]'}`}>
          <div className={`japanese-bg ${isDarkMode?'bg-dark-pattern':'bg-light-pattern'}`}></div>
          <div className={`h-6 w-full flex justify-between items-center px-4 text-xs font-semibold z-50 pt-2 pb-6 shrink-0 relative ${isDarkMode?'text-pink-200':'text-rose-700'}`}><span>9:41 AM</span><div className="flex space-x-1 items-center"><span>100%</span><div className={`w-6 h-3 border rounded-[3px] p-[1px] ${isDarkMode?'border-pink-200':'border-rose-500'}`}><div className={`w-full h-full rounded-[1px] ${isDarkMode?'bg-pink-200':'bg-rose-500'}`}></div></div></div></div>
          <div className="flex-1 relative overflow-hidden">
            {currentView === 'menu' && renderMenu()}
            {currentView === 'settings' && renderSettings()}
            {currentView === 'pathMap' && renderPathMap()}
            {currentView === 'exerciseHub' && renderExerciseHub()}
            {currentView === 'lessonSelect' && renderLessonSelect()}
            {currentView === 'lessonIntro' && renderLessonIntro()}
            {(currentView === 'learn' || currentView === 'practice') && renderCanvasView()}
            {currentView === 'game' && renderMiniGame()}
            {currentView === 'moraLab' && renderMoraLab()}
            {currentView === 'dashboard' && renderDashboard()}
            {(currentView === 'summary' || currentView === 'gameSummary') && renderSummary()}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<JapanWritingApp />);
  </script>
</body>
</html>
