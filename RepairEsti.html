    <style>
        body {
            font-family: 'Kanit', sans-serif;
            /* เพิ่มพื้นหลังลายน่ารักๆ แบบจางๆ */
            background-image: radial-gradient(#e0e7ff 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 🚗 อนิเมชันรถดุ๊กดิ๊ก */
        @keyframes wiggle {
            0% { transform: rotate(-5deg) translateY(0); }
            25% { transform: rotate(5deg) translateY(-4px); }
            50% { transform: rotate(-5deg) translateY(0); }
            75% { transform: rotate(5deg) translateY(-2px); }
            100% { transform: rotate(-5deg) translateY(0); }
        }
        .animate-car-wiggle {
            animation: wiggle 1.2s infinite ease-in-out;
            display: inline-block;
        }
        
        /* อนิเมชันลอยเบาๆ สำหรับการ์ด */
        .hover-float:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

        function formatNumber(num) {
            return Number(num || 0).toLocaleString('en-US');

        function getIconHTML(type, classes = "") {
            switch(type) {
                case 'critical': return `<i data-lucide="alert-triangle" class="text-orange-500 shrink-0 ${classes}"></i>`;
                case 'electric': return `<i data-lucide="zap" class="text-purple-500 shrink-0 ${classes}"></i>`;
                case 'part': return `<i data-lucide="settings" class="text-slate-500 shrink-0 ${classes}"></i>`;
                default: return `<i data-lucide="droplet" class="text-blue-400 shrink-0 ${classes}"></i>`; 
            }
        }

        function calculateServiceStatus() {
            const currentCarData = data[activeCar];
            const currentModel = CAR_MODELS[activeCar];
            
            return currentModel.intervals.map(item => {
                const historyItems = currentCarData.history.filter(h => h.items.includes(item.id));
                const latestRecord = historyItems.sort((a, b) => b.mileage - a.mileage)[0];
                const lastMileage = latestRecord ? latestRecord.mileage : 0;
                const nextDue = lastMileage === 0 ? item.interval : lastMileage + item.interval;
                const remaining = nextDue - currentCarData.mileage;
                
                let status = 'good';
                if (remaining <= 0) status = 'overdue';
                else if (remaining <= 3000) status = 'warning';

                return { ...item, lastMileage, nextDue, remaining, status, lastDate: latestRecord ? latestRecord.date : 'ไม่เคยบันทึก' };
            }).sort((a, b) => a.remaining - b.remaining); 
        }

        function calculateLatestHealth() {
            const recordsWithInspection = data[activeCar].history.filter(h => h.inspection).sort((a, b) => b.mileage - a.mileage);
            if (recordsWithInspection.length === 0) return null;
            return recordsWithInspection[0].inspection;
        }

        function calculateFinanceData() {
            const p = data[activeCar].profile || {};
            const parseNum = (val) => parseInt(val?.toString().replace(/,/g, '') || 0);
            
            const purchasePrice = parseNum(p.price);
            const currentValue = parseNum(p.currentValue);
            const depreciation = purchasePrice - currentValue;
            
            const purchaseDate = p.purchaseDate ? new Date(p.purchaseDate) : new Date();
            let yearsOwned = (new Date() - purchaseDate) / (1000 * 60 * 60 * 24 * 365.25);
            if (yearsOwned <= 0 || isNaN(yearsOwned)) yearsOwned = CAR_MODELS[activeCar].ageYears; 

            // Repairs
            const totalRepairs = data[activeCar].history.reduce((sum, record) => sum + (record.cost || 0), 0);
            
            // Yearly
            const insuranceYearly = parseNum(p.insuranceYearly);
            const taxYearly = parseNum(p.taxYearly);
            const totalInsurance = insuranceYearly * yearsOwned;
            const totalTax = taxYearly * yearsOwned;
            
            // Monthly
            const fuelMonthly = parseNum(p.fuelMonthly);
            const tollsMonthly = parseNum(p.tollsMonthly);
            const parkingMonthly = parseNum(p.parkingMonthly);
            const washMonthly = parseNum(p.washMonthly);
            const totalFuel = fuelMonthly * 12 * yearsOwned;
            const totalTolls = tollsMonthly * 12 * yearsOwned;
            const totalParking = parkingMonthly * 12 * yearsOwned;
            const totalWash = washMonthly * 12 * yearsOwned;
            
            // Fixed Totals
            const accessoriesTotal = parseNum(p.accessoriesTotal);
            const finesTotal = parseNum(p.finesTotal);

            // Groupings for Chart
            const groupRepairs = totalRepairs;
            const groupTravel = totalFuel + totalTolls + totalParking;
            const groupFixed = totalInsurance + totalTax;
            const groupMisc = totalWash + accessoriesTotal + finesTotal;

            const totalOperatingCost = groupRepairs + groupTravel + groupFixed + groupMisc;
            const avgCostPerYear = totalOperatingCost / yearsOwned;
            const avgCostPerMonth = avgCostPerYear / 12;

            return { 
                purchasePrice, currentValue, depreciation, yearsOwned,
                totalRepairs, totalInsurance, totalTax,
                totalFuel, totalTolls, totalParking, totalWash,
                accessoriesTotal, finesTotal,
                groupRepairs, groupTravel, groupFixed, groupMisc,
                totalOperatingCost, avgCostPerYear, avgCostPerMonth
            };
        }

            const modalHTML = `

        function toggleItem(id, labelEl) {
            const checkbox = labelEl.querySelector('input');
            if (labelEl.tagName.toLowerCase() === 'label' && event.target !== checkbox) {
                 checkbox.checked = !checkbox.checked;
            }
            if(checkbox.checked && !selectedItems.includes(id)) {
                selectedItems.push(id);
                labelEl.classList.add('bg-indigo-50', 'border-indigo-500', 'text-indigo-900', 'shadow-md');
                labelEl.classList.remove('bg-white', 'border-slate-100', 'hover:border-indigo-200', 'hover:bg-indigo-50/30');
            } else if (!checkbox.checked) {
                selectedItems = selectedItems.filter(i => i !== id);
                labelEl.classList.remove('bg-indigo-50', 'border-indigo-500', 'text-indigo-900', 'shadow-md');
                labelEl.classList.add('bg-white', 'border-slate-100', 'hover:border-indigo-200', 'hover:bg-indigo-50/30');
            }
        }

        function toggleProMode() {
            showProMode = !showProMode;
            const container = document.getElementById('proModeContainer');
            const btn = container.previousElementSibling;
            
            if (showProMode) {
                container.classList.remove('hidden');
                btn.className = "w-full p-4 flex justify-between items-center font-bold text-sm transition-colors bg-gradient-to-r from-slate-800 to-slate-700 text-white";
                btn.querySelector('span i').className = "lucide lucide-settings-2 text-yellow-400 w-5 h-5";
                btn.querySelector('svg:last-child').setAttribute('data-lucide', 'chevron-up');
            } else {
                container.classList.add('hidden');
                btn.className = "w-full p-4 flex justify-between items-center font-bold text-sm transition-colors bg-white text-slate-700 hover:bg-slate-50";
                btn.querySelector('span i').className = "lucide lucide-settings-2 text-slate-400 w-5 h-5";
                btn.querySelector('svg:last-child').setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        }

        function handleSaveRecord(e) {
            e.preventDefault();
            const date = document.getElementById('r_date').value;
            const mileage = document.getElementById('r_mileage').value;
            if (!date || !mileage) return;

            const inspection = {
                obd: document.getElementById('r_obd').value,
                batteryV: document.getElementById('r_batV').value,
                batteryCCA: document.getElementById('r_batCCA').value,
                brakeF: document.getElementById('r_brakeF').value,
                brakeR: document.getElementById('r_brakeR').value,
                treadF: document.getElementById('r_treadF').value,
                treadR: document.getElementById('r_treadR').value,
                brandSpecific: document.getElementById('r_brandSpec').value,
            };
            const isInspectionEmpty = Object.values(inspection).every(val => val === '');

            const costVal = document.getElementById('r_cost').value;

            const recordToSave = {
                id: editingRecordId || Date.now(),
                date: date,
                mileage: parseInt(mileage),
                garage: document.getElementById('r_garage').value || 'ไม่ระบุ',
                items: [...selectedItems],
                notes: document.getElementById('r_notes').value,
                receiptLink: document.getElementById('r_receipt').value,
                cost: costVal ? parseInt(costVal) : 0,
                inspection: showProMode && !isInspectionEmpty ? inspection : null
            };

            const currentHistory = data[activeCar].history;
            if (editingRecordId) {
                data[activeCar].history = currentHistory.map(r => r.id === editingRecordId ? recordToSave : r);
            } else {
                data[activeCar].history.push(recordToSave);
            }
            
            data[activeCar].mileage = Math.max(data[activeCar].mileage, parseInt(mileage));
            data[activeCar].history.sort((a, b) => b.mileage - a.mileage);

            closeModal();
            renderApp();
        }

        // --- RENDER MAIN ---

                            </div>

                    `).join('')}

                <!-- Top Info Bar -->

                    <div class="flex flex-col gap-2 relative z-10">

                        <div class="flex items-end gap-2">
                            <span class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight leading-none">${formatNumber(currentCarData.mileage)}</span>
                            <span class="text-slate-400 font-bold mb-1.5">กม.</span>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto relative z-10">
                        <form onsubmit="handleUpdateMileage(event)" class="flex gap-2 w-full md:w-auto">

                    <button onclick="setActiveTabState('history')" class="flex-1 py-3 px-4 text-sm font-bold transition-all rounded-xl whitespace-nowrap ${activeTab === 'history' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}">📓 สมุดประวัติ</button>
                    <button onclick="setActiveTabState('finance')" class="flex-1 py-3 px-4 text-sm font-bold transition-all rounded-xl whitespace-nowrap ${activeTab === 'finance' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-200/50'}">💰 สรุปการเงิน</button>

            const latestHealth = calculateLatestHealth();
            const overdueItems = serviceStatus.filter(s => s.status !== 'good');

            let html = `<div class="space-y-8">`;
            
            html += `

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="p-4 rounded-2xl border-2 ${parseFloat(latestHealth.batteryV) < 12.0 || parseInt(latestHealth.batteryCCA) < 350 ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-100'}">
                                <div class="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2"><i data-lucide="zap" class="w-4 h-4"></i> แบตเตอรี่</div>

                                <div class="text-xs font-medium text-slate-500 mt-1">CCA: ${latestHealth.batteryCCA || '-'}</div>
                            </div>
                            <div class="p-4 rounded-2xl border-2 ${(parseFloat(latestHealth.brakeF) < 4 || parseFloat(latestHealth.brakeR) < 4) ? 'bg-orange-50 border-orange-200' : 'bg-slate-50 border-slate-100'}">
                                <div class="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2"><i data-lucide="shield-check" class="w-4 h-4"></i> ผ้าเบรก</div>
                                <div class="text-sm font-black text-slate-800">หน้า: <span class="text-lg">${latestHealth.brakeF || '-'}</span> <span class="text-xs font-normal">มม.</span></div>
                                <div class="text-xs font-medium text-slate-500 mt-1">หลัง: ${latestHealth.brakeR || '-'} มม.</div>
                            </div>
                            <div class="p-4 rounded-2xl border-2 ${(parseFloat(latestHealth.treadF) < 3 || parseFloat(latestHealth.treadR) < 3) ? 'bg-orange-50 border-orange-200' : 'bg-slate-50 border-slate-100'}">
                                <div class="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider mb-2"><i data-lucide="gauge" class="w-4 h-4"></i> ดอกยาง</div>
                                <div class="text-sm font-black text-slate-800">หน้า: <span class="text-lg">${latestHealth.treadF || '-'}</span> <span class="text-xs font-normal">มม.</span></div>
                                <div class="text-xs font-medium text-slate-500 mt-1">หลัง: ${latestHealth.treadR || '-'} มม.</div>
                            </div>
                            <div class="p-4 rounded-2xl border-2 ${latestHealth.obd && latestHealth.obd !== 'No DTCs' && latestHealth.obd !== 'P0000' && latestHealth.obd.length > 2 ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-100'}">

                `;
            }

            html += `
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-extrabold text-slate-800">รายการดูแลตามระยะไมล์</h3>

            if (overdueItems.length > 0) {
                html += `
                    <div class="bg-red-50 border border-red-200 rounded-3xl p-5 mb-6">

                            <div class="flex justify-between items-center"><span class="text-xs font-semibold text-slate-400">รอบถัดไป</span><strong class="text-blue-600 text-base">${formatNumber(item.nextDue)}</strong></div>

                        <div class="absolute -right-8 -bottom-8 opacity-0 group-hover:opacity-[0.03] transition-opacity duration-500 scale-150">${getIconHTML(item.type, "w-32 h-32 text-black")}</div>
                    </div>
                `;
            });
            html += `</div></div>`;
            return html;
        }

                    </div>
                    
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl shadow-lg p-6 text-white grid grid-cols-1 md:grid-cols-2 gap-6 divide-y md:divide-y-0 md:divide-x divide-white/20">
                        <div class="flex flex-col items-center justify-center pt-2 md:pt-0"><p class="text-blue-200 font-bold mb-2 text-sm uppercase tracking-widest">จ่ายเฉลี่ย <strong class="text-white text-base">ต่อปี</strong></p><div class="text-4xl font-black text-white flex items-end gap-2 drop-shadow-md">฿${formatNumber(Math.round(f.avgCostPerYear))}</div></div>
                        <div class="flex flex-col items-center justify-center pt-6 md:pt-0"><p class="text-blue-200 font-bold mb-2 text-sm uppercase tracking-widest">จ่ายเฉลี่ย <strong class="text-yellow-300 text-base">ต่อเดือน</strong></p><div class="text-4xl font-black text-yellow-300 flex items-end gap-2 drop-shadow-md">฿${formatNumber(Math.round(f.avgCostPerMonth))}</div></div>
                    </div>
                </div>
            `;
        }

        function renderHistory() {
            const history = data[activeCar].history;
            const currentModel = CAR_MODELS[activeCar];
            
            let html = `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
                    <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
                        <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2"><i data-lucide="book-open" class="text-indigo-500"></i> สมุดบันทึกประวัติ</h3>
                        <button onclick="openRecordModal()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover-float shadow-md shadow-indigo-500/20"><i data-lucide="plus-circle" class="w-4 h-4"></i> เพิ่มข้อมูล</button>
                    </div>
            `;

            if (history.length === 0) {
                html += `<div class="text-center py-16 text-slate-400"><i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 opacity-20"></i><p class="font-bold">ยังว่างเปล่า เริ่มบันทึกประวัติซ่อมเลย!</p></div>`;
            } else {
                html += `<div class="space-y-8 relative before:absolute before:inset-0 before:ml-[1.3rem] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-1 before:bg-gradient-to-b before:from-indigo-100 before:via-indigo-200 before:to-transparent">`;
                history.forEach(record => {
                    html += `
                        <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                            <div class="flex items-center justify-center w-12 h-12 rounded-full border-4 border-white bg-indigo-500 text-white shadow-md shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 hover:scale-110 transition-transform"><i data-lucide="wrench" class="w-5 h-5"></i></div>
                            <div class="w-[calc(100%-4rem)] md:w-[calc(50%-3rem)] bg-white hover:bg-indigo-50/30 transition-colors p-6 rounded-3xl border-2 border-slate-100 shadow-sm relative">
                                <div class="absolute top-5 right-5 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="openRecordModal(${record.id})" class="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition" title="แก้ไข"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="confirmDelete(${record.id})" class="p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition" title="ลบ"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                                <div class="flex flex-col mb-4"><span class="font-black text-slate-800 text-2xl text-indigo-900">${formatNumber(record.mileage)} <span class="text-sm text-slate-500">กม.</span></span><span class="text-xs font-bold text-white bg-indigo-400 px-3 py-1 rounded-full w-fit mt-2 shadow-sm">${record.date}</span></div>
                                <div class="flex flex-col gap-3 mb-5">
                                    <div class="text-sm text-slate-700 flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <div class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4 text-slate-400"></i> <span class="font-bold">${record.garage}</span></div>
                                        ${record.cost > 0 ? `<div class="font-black text-green-700 bg-green-100 px-3 py-1 rounded-lg text-sm">฿${formatNumber(record.cost)}</div>` : ''}
                                    </div>
                                    ${record.receiptLink ? `<a href="${record.receiptLink}" target="_blank" class="text-sm font-bold text-indigo-600 flex items-center gap-2 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-xl transition w-fit"><i data-lucide="file-check-2" class="w-4 h-4"></i> ดูบิล/ใบเสร็จ</a>` : ''}
                                </div>
                    `;

                    if (record.inspection) {
                        html += `
                            <div class="mb-5 bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-4 shadow-md text-white">
                                <h5 class="text-xs font-bold text-blue-300 uppercase tracking-wider mb-3 flex items-center gap-2 border-b border-slate-700 pb-2"><i data-lucide="activity" class="w-4 h-4"></i> ข้อมูลตรวจเช็คเชิงลึก</h5>
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div><span class="text-slate-400 text-xs block mb-0.5">OBD-II</span><span class="font-bold ${record.inspection.obd && record.inspection.obd !== 'P0000' && !record.inspection.obd.includes('No') ? 'text-red-400' : 'text-white'}">${record.inspection.obd || '-'}</span></div>
                                    <div><span class="text-slate-400 text-xs block mb-0.5">แบต (V/CCA)</span><span class="font-bold">${record.inspection.batteryV || '-'}V / ${record.inspection.batteryCCA || '-'}</span></div>
                                    <div><span class="text-slate-400 text-xs block mb-0.5">เบรก (หน้า/หลัง)</span><span class="font-bold text-blue-200">${record.inspection.brakeF || '-'} / ${record.inspection.brakeR || '-'} มม.</span></div>
                                    <div><span class="text-slate-400 text-xs block mb-0.5">ยาง (หน้า/หลัง)</span><span class="font-bold text-blue-200">${record.inspection.treadF || '-'} / ${record.inspection.treadR || '-'} มม.</span></div>
                                </div>
                                ${record.inspection.brandSpecific ? `<div class="mt-3 pt-3 border-t border-slate-700 text-xs text-slate-300"><span class="font-bold text-yellow-400">ผลเฉพาะรุ่น:</span> ${record.inspection.brandSpecific}</div>` : ''}
                            </div>
                        `;
                    }

                    html += `<div class="flex flex-wrap gap-2 mb-4">`;
                    record.items.forEach(itemId => {
                        const itemDef = currentModel.intervals.find(i => i.id === itemId);
                        if(itemDef) html += `<div class="text-xs bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-lg text-blue-800 flex items-center gap-1.5 font-bold"><i data-lucide="check" class="w-3.5 h-3.5 text-blue-500"></i>${itemDef.name}</div>`;
                    });
                    html += `</div>`;
                    
                    if(record.notes) html += `<div class="text-sm text-slate-600 bg-amber-50 border border-amber-100 p-4 rounded-2xl italic font-medium flex gap-2 items-start"><i data-lucide="message-square" class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"></i>"${record.notes}"</div>`;
                    
                    html += `</div></div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        }

        function renderProfile() {
            const p = data[activeCar].profile || {};
            const dateStr = p.purchaseDate ? new Date(p.purchaseDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-';
            const taxStr = p.taxDate ? new Date(p.taxDate).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-';

            return `
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
                    <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-4">
                        <h3 class="text-xl font-extrabold text-slate-800 flex items-center gap-2"><i data-lucide="car" class="text-indigo-500"></i> ข้อมูลพื้นฐานรถยนต์</h3>
                        <button onclick="openProfileModal()" class="bg-indigo-50 text-indigo-700 px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-100 transition hover-float"><i data-lucide="edit-3" class="w-4 h-4"></i> แก้ไขข้อมูลรถ</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-6">
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="hash" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ทะเบียนรถ</p><p class="text-xl font-black text-slate-800">${p.plate || '-'}</p></div></div>
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="calendar" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">วันที่ซื้อ / ออกรถ</p><p class="text-lg font-bold text-slate-800">${dateStr}</p></div></div>
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="map-pin" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ศูนย์บริการ / ที่ซื้อ</p><p class="text-lg font-bold text-slate-800">${p.purchaseLocation || '-'}</p></div></div>
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="dollar-sign" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">ราคาป้ายแดง</p><p class="text-lg font-black text-slate-800">${p.price ? `฿${formatNumber(p.price)}` : '-'}</p></div></div>
                        </div>
                        <div class="space-y-6">
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="fingerprint" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">เลขตัวถัง (VIN)</p><p class="text-sm font-mono font-black text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 inline-block">${p.vin || '-'}</p></div></div>
                            <div class="flex items-start gap-4"><div class="bg-indigo-50 p-3 rounded-2xl text-indigo-500"><i data-lucide="palette" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">สีรถ</p><p class="text-lg font-bold text-slate-800">${p.color || '-'}</p></div></div>
                            <div class="flex items-start gap-4"><div class="bg-red-50 p-3 rounded-2xl text-red-500"><i data-lucide="calendar-clock" class="w-6 h-6"></i></div><div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">วันครบต่อ ภาษี/พ.ร.บ.</p><p class="text-lg font-black text-red-600">${taxStr}</p></div></div>
                            <div class="bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-2xl border border-indigo-100 flex items-start gap-4">
                                <div class="bg-white p-2 rounded-xl text-blue-500 shadow-sm"><i data-lucide="settings" class="w-5 h-5 animate-spin" style="animation-duration: 3s;"></i></div>
                                <div><p class="text-sm font-extrabold text-blue-900 mb-1">จัดการค่าใช้จ่ายรถ</p><p class="text-xs font-medium text-blue-700/80">คุณสามารถปรับแต่งค่าประกัน, ค่าน้ำมัน, และอื่นๆ ได้ในปุ่มแก้ไขข้อมูลรถด้านบน</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });

    </script>
</body>
</html>
